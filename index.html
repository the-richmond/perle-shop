<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pērle — Luxury Leather Accessories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Bodoni+Moda:ital,opsz,wght@1,6..96,400;1,6..96,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="perle-data.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      cursor: none;
      background: #f3ece0;
      color: #1a1410;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      overflow-x: hidden;
    }
    input, select, textarea, button { font-family: inherit; cursor: none; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #f3ece0; }
    ::-webkit-scrollbar-thumb { background: rgba(140,100,60,0.25); border-radius: 2px; }
    ::selection { background: rgba(140,100,60,0.14); }
    a { cursor: none; }
    /* Prevent text selection during drag */
    .no-select { user-select: none; -webkit-user-select: none; }

    /* ─── Pearl glow behind hero "Pērle" wordmark ─── */
    .perle-glow { will-change: transform, opacity; }
    @keyframes perle-orbit-rose {
      0%,100% { transform: translate(-3%, -2%) scale(1.00); opacity: 0.85; }
      50%     { transform: translate( 4%,  3%) scale(1.10); opacity: 1.00; }
    }
    @keyframes perle-orbit-azure {
      0%,100% { transform: translate( 2%,  3%) scale(1.05); opacity: 0.90; }
      50%     { transform: translate(-4%, -2%) scale(1.00); opacity: 0.70; }
    }
    @keyframes perle-orbit-lilac {
      0%,100% { transform: translate( 0%,  0%) scale(0.96); opacity: 0.75; }
      50%     { transform: translate( 3%, -3%) scale(1.08); opacity: 1.00; }
    }
    @keyframes perle-orbit-warm {
      0%,100% { transform: translate(-2%,  2%) scale(1.02); opacity: 0.65; }
      50%     { transform: translate( 1%, -1%) scale(0.98); opacity: 0.90; }
    }
    .perle-glow-rose  { animation: perle-orbit-rose  13s ease-in-out infinite; }
    .perle-glow-azure { animation: perle-orbit-azure 17s ease-in-out infinite; }
    .perle-glow-lilac { animation: perle-orbit-lilac 11s ease-in-out infinite reverse; }
    .perle-glow-warm  { animation: perle-orbit-warm  19s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .perle-glow { animation: none !important; }
    }

    /* ─── Touch / mobile devices: native cursor, hide our pearl ─── */
    @media (hover: none), (pointer: coarse) {
      body, input, select, textarea, button, a { cursor: auto; }
      .pearl-cursor { display: none !important; }
    }

    /* ─── Mobile layout ─── */
    @media (max-width: 640px) {
      .perle-modal-card { flex-direction: column !important; max-height: 92vh !important; }
      .perle-modal-img  { padding: 28px !important; }
      .perle-cart-side  { width: 100vw !important; }
      .perle-nav        { padding: 0 18px !important; }
      .perle-nav-links  { gap: 14px !important; }
    }
  </style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;overflow:hidden" aria-hidden="true">
  <defs>
    <filter id="pearl-sand" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.80" numOctaves="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="matrix" in="n" result="s"
        values="0 0 0 0 0.68  0 0 0 0 0.56  0 0 0 0 0.38  0 0 0 0.11 0"/>
      <feBlend in="SourceGraphic" in2="s" mode="overlay" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
</svg>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const T = (t, lang) => (window.I18N?.[lang]?.[t]) ?? t;

/* ─── helpers ─── */
function lum(hex) {
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  return 0.299*r+0.587*g+0.114*b;
}

/* ════════════════════════════════════════════════════════
   CUSTOM PEARL CURSOR
════════════════════════════════════════════════════════ */
function Cursor() {
  const ref = useRef(null);
  const [size, setSize] = useState(13);
  const [filled, setFilled] = useState(false);

  useEffect(() => {
    window.__cursor = { hover: () => setSize(19), idle: () => setSize(13), grab: () => { setSize(22); setFilled(true); }, release: () => { setSize(13); setFilled(false); } };
    const mv = e => { if (ref.current) ref.current.style.transform = `translate(${e.clientX - size/2}px,${e.clientY - size/2}px)`; };
    window.addEventListener('pointermove', mv);
    return () => window.removeEventListener('pointermove', mv);
  }, []);

  return (
    <div ref={ref} style={{
      position:'fixed', top:0, left:0, width:size, height:size, borderRadius:'50%',
      pointerEvents:'none', zIndex:9999, willChange:'transform',
      transition:'width 0.15s,height 0.15s',
      background: filled
        ? 'radial-gradient(circle at 35% 28%, #f0e8e0, #c8b4c0 42%, #a0adb8)'
        : 'radial-gradient(circle at 35% 28%, rgba(240,232,224,0.88), rgba(200,180,192,0.80) 42%, rgba(160,173,184,0.75))',
      boxShadow: filled ? '0 2px 8px rgba(100,70,50,0.22)' : 'none',
      border: '0.8px solid rgba(180,155,130,0.40)',
    }} className="no-select pearl-cursor"/>
  );
}

/* ════════════════════════════════════════════════════════
   PEARL LOGO with hover shimmer animation
════════════════════════════════════════════════════════ */
function PearlLogo({ size = 42 }) {
  const [hov, setHov] = useState(false);
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{ flexShrink:0, display:'block' }}
         onMouseEnter={() => { setHov(true); window.__cursor?.hover(); }}
         onMouseLeave={() => { setHov(false); window.__cursor?.idle(); }}>
      <defs>
        <radialGradient id="lf" cx="34%" cy="24%" r="72%">
          <stop offset="0%"   stopColor="#fce8ec"/>
          <stop offset="18%"  stopColor="#eed4dc"/>
          <stop offset="44%"  stopColor="#d4c0d2"/>
          <stop offset="70%"  stopColor="#c0bcd6"/>
          <stop offset="100%" stopColor="#d4b8bc"/>
        </radialGradient>
        <radialGradient id="lhl" cx="28%" cy="20%" r="42%">
          <stop offset="0%"   stopColor="rgba(255,252,252,0.95)"/>
          <stop offset="100%" stopColor="rgba(255,252,252,0)"/>
        </radialGradient>
        <radialGradient id="lsh" cx="68%" cy="72%" r="40%">
          <stop offset="0%"   stopColor="rgba(172,204,232,0.60)"/>
          <stop offset="100%" stopColor="rgba(172,204,232,0)"/>
        </radialGradient>
        <radialGradient id="lrose" cx="75%" cy="22%" r="36%">
          <stop offset="0%"   stopColor="rgba(240,190,208,0.55)"/>
          <stop offset="100%" stopColor="rgba(240,190,208,0)"/>
        </radialGradient>
      </defs>
      <circle cx="50" cy="50" r="46" fill="url(#lf)" filter="url(#pearl-sand)"/>
      <circle cx="50" cy="50" r="46" fill="url(#lhl)"/>
      <circle cx="50" cy="50" r="46" fill="url(#lsh)" style={{ opacity: hov ? 1 : 0.3, transition:'opacity 0.7s ease' }}/>
      <circle cx="50" cy="50" r="46" fill="url(#lrose)" style={{ opacity: hov ? 1 : 0.2, transition:'opacity 0.9s ease' }}/>
      <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(210,175,182,0.38)" strokeWidth="1.5"/>
      <text x="50" y="56" fontFamily="'Bodoni Moda',serif" fontSize="26" fontWeight="400" fontStyle="italic"
            textAnchor="middle" dominantBaseline="middle" fill="#1a1410" opacity="0.76">PRL</text>
    </svg>
  );
}

/* ════════════════════════════════════════════════════════
   WALLET SVGs — CLOSED & OPEN STATES
════════════════════════════════════════════════════════ */
function LeatherDefs({ c, uid, freq = '0.82' }) {
  return (
    <defs>
      <radialGradient id={`g-${uid}`} cx="30%" cy="24%" r="75%">
        <stop offset="0%"   stopColor={c.hi}/>
        <stop offset="44%"  stopColor={c.base}/>
        <stop offset="100%" stopColor={c.dk}/>
      </radialGradient>
      <radialGradient id={`hl-${uid}`} cx="26%" cy="20%" r="45%">
        <stop offset="0%"   stopColor="rgba(255,252,248,0.52)"/>
        <stop offset="100%" stopColor="rgba(255,252,248,0)"/>
      </radialGradient>
      <filter id={`n-${uid}`}>
        <feTurbulence type="fractalNoise" baseFrequency={freq} numOctaves="4" stitchTiles="stitch" result="n"/>
        <feColorMatrix type="matrix" in="n" result="g" values="0 0 0 0 0.48 0 0 0 0 0.36 0 0 0 0 0.20 0 0 0 0.09 0"/>
        <feBlend in="SourceGraphic" in2="g" mode="overlay"/>
      </filter>
    </defs>
  );
}

function _BifoldClosed({ c, uid }) {
  const W=232,H=150,rx=10;
  const light = lum(c.base)>0.28;
  const line = light?'rgba(80,55,30,0.20)':'rgba(215,195,170,0.22)';
  const mark = light?'rgba(70,50,28,0.44)':'rgba(210,190,165,0.44)';
  const stitch = light?'rgba(70,50,28,0.10)':'rgba(215,195,170,0.11)';
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      <LeatherDefs c={c} uid={uid}/>
      <rect width={W} height={H} rx={rx} fill={`url(#g-${uid})`} filter={`url(#n-${uid})`}/>
      <rect width={W} height={H} rx={rx} fill={`url(#hl-${uid})`}/>
      <rect x="8" y="8" width={W-16} height={H-16} rx={rx-3} fill="none" stroke={stitch} strokeWidth="0.8" strokeDasharray="4 3"/>
      <line x1={W/2} y1="12" x2={W/2} y2={H-12} stroke={line} strokeWidth="0.9"/>
      {[0.28,0.50,0.72].map((f,i)=>(
        <line key={i} x1={W/2+14} y1={H*f} x2={W-16} y2={H*f} stroke={line} strokeWidth="0.65"/>
      ))}
      {[0.28,0.50,0.72].map((f,i)=>(
        <line key={i} x1={16} y1={H*f} x2={W/2-14} y2={H*f} stroke={line} strokeWidth="0.65"/>
      ))}
      <ellipse cx={W/2} cy={H/2} rx="24" ry="14" fill="none" stroke={mark} strokeWidth="0.7"/>
      <text x={W/2} y={H/2} fontFamily="'Bodoni Moda',serif" fontSize="11" fontStyle="italic"
            fill={mark} textAnchor="middle" dominantBaseline="middle">prl</text>
    </svg>
  );
}

function _BifoldOpen({ c, uid }) {
  const W=310,H=156,rx=8, half=W/2;
  const light = lum(c.base)>0.28;
  const line = light?'rgba(80,55,30,0.20)':'rgba(215,195,170,0.22)';
  const stitch = light?'rgba(70,50,28,0.10)':'rgba(215,195,170,0.10)';
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      <LeatherDefs c={c} uid={`${uid}o`}/>
      {/* Left half */}
      <rect width={half-3} height={H} rx={rx} fill={`url(#g-${uid}o)`} filter={`url(#n-${uid}o)`}/>
      <rect width={half-3} height={H} rx={rx} fill={`url(#hl-${uid}o)`}/>
      <rect x="7" y="7" width={half-16} height={H-14} rx={rx-3} fill="none" stroke={stitch} strokeWidth="0.7" strokeDasharray="3.5 2.5"/>
      {[0,1,2].map(i=><rect key={i} x={10+i*4} y={12+i*7} width={half-28-i*8} height={H-36} rx="4" fill="none" stroke={line} strokeWidth="0.65"/>)}
      <line x1="10" y1={H-20} x2={half-12} y2={H-20} stroke={line} strokeWidth="0.65"/>
      {/* Spine */}
      <rect x={half-4} y={0} width={8} height={H} fill={c.dk} opacity="0.45"/>
      {/* Right half */}
      <rect x={half+3} width={half-3} height={H} rx={rx} fill={`url(#g-${uid}o)`} filter={`url(#n-${uid}o)`}/>
      <rect x={half+3} width={half-3} height={H} rx={rx} fill={`url(#hl-${uid}o)`}/>
      <rect x={half+10} y="7" width={half-16} height={H-14} rx={rx-3} fill="none" stroke={stitch} strokeWidth="0.7" strokeDasharray="3.5 2.5"/>
      {[0,1,2].map(i=><rect key={i} x={half+6+i*4} y={12+i*7} width={half-28-i*8} height={H-36} rx="4" fill="none" stroke={line} strokeWidth="0.65"/>)}
      <line x1={half+8} y1={H-20} x2={W-10} y2={H-20} stroke={line} strokeWidth="0.65"/>
    </svg>
  );
}

function _CardholderClosed({ c, uid }) {
  const W=152,H=190,rx=10;
  const light = lum(c.base)>0.28;
  const line = light?'rgba(80,55,30,0.20)':'rgba(215,195,170,0.22)';
  const mark = light?'rgba(70,50,28,0.44)':'rgba(210,190,165,0.44)';
  const stitch = light?'rgba(70,50,28,0.10)':'rgba(215,195,170,0.11)';
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      <LeatherDefs c={c} uid={uid}/>
      <rect width={W} height={H} rx={rx} fill={`url(#g-${uid})`} filter={`url(#n-${uid})`}/>
      <rect width={W} height={H} rx={rx} fill={`url(#hl-${uid})`}/>
      <rect x="8" y="8" width={W-16} height={H-16} rx={rx-3} fill="none" stroke={stitch} strokeWidth="0.8" strokeDasharray="4 3"/>
      {[0,1,2].map(i=>(
        <rect key={i} x={10+i*5} y={10+i*7} width={W-20-i*10} height={H*.38} rx="5" fill="none" stroke={line} strokeWidth="0.65"/>
      ))}
      <line x1="12" y1={H*.56} x2={W-12} y2={H*.56} stroke={line} strokeWidth="0.65"/>
      {[0,1,2].map(i=>(
        <rect key={i} x={10+i*5} y={H*.62+i*7} width={W-20-i*10} height={H*.28} rx="5" fill="none" stroke={line} strokeWidth="0.65"/>
      ))}
      <ellipse cx={W/2} cy={H*.50} rx="22" ry="13" fill="none" stroke={mark} strokeWidth="0.7"/>
      <text x={W/2} y={H*.50} fontFamily="'Bodoni Moda',serif" fontSize="11" fontStyle="italic"
            fill={mark} textAnchor="middle" dominantBaseline="middle">prl</text>
    </svg>
  );
}

function _CardholderOpen({ c, uid }) {
  const W=240,H=190,rx=8,panelW=70,mid=W/2;
  const light = lum(c.base)>0.28;
  const line = light?'rgba(80,55,30,0.20)':'rgba(215,195,170,0.22)';
  const stitch = light?'rgba(70,50,28,0.10)':'rgba(215,195,170,0.10)';
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}>
      <LeatherDefs c={c} uid={`${uid}o`}/>
      {/* Left outer panel */}
      <rect width={panelW} height={H} rx={rx} fill={`url(#g-${uid}o)`} filter={`url(#n-${uid}o)`}/>
      <rect width={panelW} height={H} rx={rx} fill={`url(#hl-${uid}o)`}/>
      {[0,1,2].map(i=><rect key={i} x={7+i*3} y={10+i*6} width={panelW-14-i*6} height={H*.38} rx="4" fill="none" stroke={line} strokeWidth="0.6"/>)}
      {[0,1,2].map(i=><rect key={i} x={7+i*3} y={H*.56+i*6} width={panelW-14-i*6} height={H*.28} rx="4" fill="none" stroke={line} strokeWidth="0.6"/>)}
      {/* Center spine/interior */}
      <rect x={panelW+2} width={W-panelW*2-4} height={H} fill={c.dk} opacity="0.28"/>
      <rect x={panelW+2} width={W-panelW*2-4} height={H} fill={`url(#hl-${uid}o)`} opacity="0.5"/>
      <rect x={panelW+2} y="7" width={W-panelW*2-4} height={H-14} rx="4" fill="none" stroke={stitch} strokeWidth="0.7" strokeDasharray="3 2.5"/>
      {/* Right outer panel */}
      <rect x={W-panelW} width={panelW} height={H} rx={rx} fill={`url(#g-${uid}o)`} filter={`url(#n-${uid}o)`}/>
      <rect x={W-panelW} width={panelW} height={H} rx={rx} fill={`url(#hl-${uid}o)`}/>
      {[0,1,2].map(i=><rect key={i} x={W-panelW+7+i*3} y={10+i*6} width={panelW-14-i*6} height={H*.38} rx="4" fill="none" stroke={line} strokeWidth="0.6"/>)}
      {[0,1,2].map(i=><rect key={i} x={W-panelW+7+i*3} y={H*.56+i*6} width={panelW-14-i*6} height={H*.28} rx="4" fill="none" stroke={line} strokeWidth="0.6"/>)}
    </svg>
  );
}

// React.memo wrappers — wallet SVG components don't depend on drag state, only on
// product colors / id. Memoizing prevents the expensive feTurbulence filters from
// re-rendering on every spring tick, which was the main source of lag.
const BifoldClosed     = React.memo(_BifoldClosed);
const BifoldOpen       = React.memo(_BifoldOpen);
const CardholderClosed = React.memo(_CardholderClosed);
const CardholderOpen   = React.memo(_CardholderOpen);

function WalletDisplay({ product, isOpen }) {
  const uid = `w${product.id}`;
  const { type, colors: c, photo, photoOpen } = product;
  if (photo) {
    return (
      <div style={{ position:'relative', display:'flex', justifyContent:'center' }}>
        <img src={photo} alt={product.name} style={{ maxWidth:'100%', maxHeight:220, objectFit:'contain', opacity: isOpen?0:1, transition:'opacity 0.35s' }}/>
        {photoOpen && <img src={photoOpen} alt={product.name+' open'} style={{ position:'absolute', inset:0, maxWidth:'100%', maxHeight:220, objectFit:'contain', opacity: isOpen?1:0, transition:'opacity 0.35s' }}/>}
      </div>
    );
  }
  return (
    <div style={{ position:'relative', display:'flex', justifyContent:'center', alignItems:'center', minHeight:190 }}>
      <div style={{ opacity: isOpen?0:1, transition:'opacity 0.3s', position: isOpen?'absolute':'relative' }}>
        {type==='bifold' ? <BifoldClosed c={c} uid={uid}/> : <CardholderClosed c={c} uid={uid}/>}
      </div>
      <div style={{ opacity: isOpen?1:0, transition:'opacity 0.3s', position: isOpen?'relative':'absolute' }}>
        {type==='bifold' ? <BifoldOpen c={c} uid={`${uid}o`}/> : <CardholderOpen c={c} uid={`${uid}o`}/>}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   SPRING DRAG HOOK (with hold-to-open)
════════════════════════════════════════════════════════ */
function useSpringDrag(onTap) {
  const el = useRef(null);
  const ph = useRef({ x:0,y:0,vx:0,vy:0 });
  const tg = useRef({ x:0,y:0 });
  const or = useRef({ x:0,y:0 });
  const mo = useRef({ x:0,y:0 });
  const dr = useRef(false);
  const mv = useRef(false);
  const held = useRef(false);                 // FIX: distinguishes long-press from quick tap
  const holdTimer = useRef(null);
  const raf= useRef(null);
  const [disp, setDisp] = useState({ x:0,y:0 });
  const [isDragging, setIsDragging] = useState(false);
  const [isOpen, setIsOpen] = useState(false);

  const tick = useCallback(() => {
    const p=ph.current, t=tg.current;
    const k=dr.current?0.12:0.18, d=dr.current?0.80:0.72;
    p.vx=(p.vx+(t.x-p.x)*k)*d; p.vy=(p.vy+(t.y-p.y)*k)*d;
    p.x+=p.vx; p.y+=p.vy;
    setDisp({x:p.x,y:p.y});
    const done=!dr.current&&Math.abs(p.vx)<0.08&&Math.abs(p.vy)<0.08&&Math.abs(t.x-p.x)<0.15&&Math.abs(t.y-p.y)<0.15;
    if(!done) raf.current=requestAnimationFrame(tick);
    else { p.x=0;p.y=0;p.vx=0;p.vy=0; setDisp({x:0,y:0}); raf.current=null; }
  }, []);

  const onPointerDown = useCallback(e => {
    e.preventDefault();
    const rect=el.current.getBoundingClientRect();
    const cx=rect.left+rect.width/2-ph.current.x, cy=rect.top+rect.height/2-ph.current.y;
    or.current={x:cx,y:cy}; mo.current={x:e.clientX-rect.left-rect.width/2, y:e.clientY-rect.top-rect.height/2};
    dr.current=true; mv.current=false; held.current=false;
    // After 180 ms it's a "hold" — releasing without movement should NOT open the modal
    holdTimer.current = setTimeout(() => { held.current = true; }, 180);
    setIsDragging(true); setIsOpen(true);
    window.__cursor?.grab();
    if(raf.current) cancelAnimationFrame(raf.current);
    raf.current=requestAnimationFrame(tick);
    el.current.setPointerCapture(e.pointerId);
  }, [tick]);

  useEffect(() => {
    const onMove=e=>{ if(!dr.current)return; mv.current=true; tg.current={x:e.clientX-or.current.x-mo.current.x, y:e.clientY-or.current.y-mo.current.y}; };
    const onUp=e=>{
      if(!dr.current) return;
      dr.current=false;
      if (holdTimer.current) { clearTimeout(holdTimer.current); holdTimer.current=null; }
      setIsDragging(false); setIsOpen(false);
      window.__cursor?.hover();
      tg.current={x:0,y:0};
      // Open description only on a quick tap (<180 ms) without movement
      if(!mv.current && !held.current) onTap&&onTap();
      if(!raf.current) raf.current=requestAnimationFrame(tick);
    };
    window.addEventListener('pointermove',onMove);
    window.addEventListener('pointerup',onUp);
    return ()=>{ window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',onUp); };
  },[tick,onTap]);

  const rot = Math.min(9,Math.max(-9,(ph.current.vx)*2.4));
  return { el, disp, isDragging, isOpen, onPointerDown, rot };
}

/* ════════════════════════════════════════════════════════
   CHECKOUT — Cerca Trova–style request flow
   ────────────────────────────────────────────────────────
   ★ КАК ЭТО РАБОТАЕТ:
     1. Покупатель проходит 3 шага: контакты → доставка СДЭК → способ связи + подтверждение.
     2. По кнопке "Отправить заявку" данные летят POST-ом на /api/order
        (это серверлесс-функция Vercel — см. файл api/order.js в репо).
        Функция отправляет тебе уведомление в Telegram-бот И на e-mail.
     3. Покупатель получает экран "С тобой свяжутся в течение 24ч",
        ты в своём боте видишь заказ и пишешь покупателю в его выбранный
        канал связи (Telegram / WhatsApp / VK / Email / Phone).
     4. Дальше всё «как у Cerca Trova» — личное общение, отправка QR/ссылки на оплату,
        уточнение деталей. Через 30-50 заказов перейдёшь на автоплатежи через
        YooKassa (место помечено TODO в /api/order.js).

   ★ ЛОКАЛЬНОЕ ТЕСТИРОВАНИЕ:
     Без серверлес-функции (просто `python -m http.server`) форма всё равно
     показывает успех — данные просто пишутся в консоль браузера. Это для
     дизайн-теста. Настоящая отправка работает после деплоя на Vercel
     с настроенными ENV-переменными (TG_BOT_TOKEN, TG_CHAT_ID, RESEND_KEY).
   ════════════════════════════════════════════════════════ */

function Checkout({ cart, onClose, onComplete, lang }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    name:'', email:'', phone:'',
    delivery_kind:'pvz', // 'pvz' or 'courier'
    city:'', sdek:'', address:'',
    notes:'',
    contact_method:'telegram', contact_value:''
  });
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const up = (k,v) => setForm(f=>({...f,[k]:v}));
  const total = cart.reduce((s,i)=>s+i.price,0);
  const inp = { width:'100%',padding:'11px 13px',background:'rgba(140,100,60,0.06)',border:'1px solid rgba(140,100,60,0.18)',borderRadius:7,color:'#1a1410',fontSize:14,outline:'none',transition:'border-color 0.2s' };
  const lbl = { fontSize:10.5,letterSpacing:'0.12em',textTransform:'uppercase',color:'rgba(100,72,44,0.45)',marginBottom:5,display:'block' };
  const steps = [T('contact',lang), T('delivery',lang), T('confirm',lang)];

  // Contact channel options shown on step 2
  const channels = [
    { id:'telegram', label:'Telegram',   ph:'@username' },
    { id:'whatsapp', label:'WhatsApp',   ph:'+7 ...' },
    { id:'vk',       label:'VKontakte',  ph:'vk.com/username' },
    { id:'email',    label:T('email',lang), ph:'name@example.com' },
    { id:'phone',    label:T('phone',lang), ph:'+7 ...' },
  ];

  const stepValid = (s) => {
    if (s === 0) return form.name.trim().length > 1 && /^\S+@\S+\.\S+$/.test(form.email) && form.phone.trim().length > 5;
    if (s === 1) {
      if (!form.city.trim()) return false;
      return form.delivery_kind === 'pvz' ? form.sdek.trim().length > 0 : form.address.trim().length > 0;
    }
    if (s === 2) return !!form.contact_method && form.contact_value.trim().length > 1;
    return false;
  };

  const submitOrder = async () => {
    setError('');
    setSubmitting(true);
    try {
      const payload = {
        customer:    { name: form.name, email: form.email, phone: form.phone },
        delivery:    {
          kind: form.delivery_kind,
          city: form.city,
          sdek: form.delivery_kind === 'pvz' ? form.sdek : '',
          address: form.delivery_kind === 'courier' ? form.address : '',
          notes: form.notes,
        },
        contact:     { method: form.contact_method, value: form.contact_value },
        items:       cart.map(i => ({ id: i.id, name: i.full, price: i.price })),
        total_usd:   total,
        language:    lang,
        submitted_at: new Date().toISOString(),
      };
      // Try the serverless function first (production on Vercel)
      let ok = false;
      try {
        const res = await fetch('/api/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.ok) ok = true;
      } catch (_) { /* fall through to dev mode */ }

      if (!ok) {
        // Dev mode fallback (no /api/order yet — e.g. running via python -m http.server)
        console.warn('Pērle DEV: /api/order not reachable. Order would be sent:', payload);
        await new Promise(r => setTimeout(r, 600));
      }
      onComplete();
    } catch (err) {
      setError(err.message || 'Submission failed');
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div style={{ position:'fixed',inset:0,zIndex:400,background:'rgba(240,234,224,0.97)',display:'flex',alignItems:'center',justifyContent:'center',padding:24,backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)' }}>
      <div style={{ background:'#f3ece0',borderRadius:18,maxWidth:500,width:'100%',boxShadow:'0 30px 80px rgba(60,30,10,0.18)',overflow:'hidden' }}>
        <div style={{ padding:'26px 30px 0',display:'flex',justifyContent:'space-between',alignItems:'center' }}>
          <div style={{ display:'flex',gap:0,alignItems:'center' }}>
            {steps.map((s,i)=>(
              <div key={i} style={{ display:'flex',alignItems:'center' }}>
                <div style={{ width:24,height:24,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:i<step?'rgba(140,100,60,0.16)':i===step?'rgba(140,100,60,0.10)':'transparent',border:`1px solid ${i<=step?'rgba(140,100,60,0.45)':'rgba(140,100,60,0.16)'}`,fontSize:10.5,color:i<=step?'rgba(100,68,28,0.88)':'rgba(100,68,28,0.32)',transition:'all 0.3s' }}>{i<step?'✓':i+1}</div>
                <span style={{ marginLeft:7,fontSize:11.5,letterSpacing:'0.07em',color:i===step?'rgba(100,68,28,0.80)':'rgba(100,68,28,0.30)',transition:'color 0.3s' }}>{s}</span>
                {i<steps.length-1&&<div style={{ width:22,height:1,background:'rgba(140,100,60,0.14)',margin:'0 10px' }}/>}
              </div>
            ))}
          </div>
          <button onClick={()=>{ window.__cursor?.idle(); onClose(); }} onMouseEnter={()=>window.__cursor?.hover()} onMouseLeave={()=>window.__cursor?.idle()}
            style={{ color:'rgba(100,72,44,0.42)',fontSize:20,background:'none',border:'none',padding:0,fontFamily:'inherit' }}>✕</button>
        </div>
        <div style={{ padding:'28px 30px 32px',display:'flex',flexDirection:'column',gap:16 }}>
          {step===0&&<>
            <h3 style={{ fontFamily:"'Fraunces',serif",fontSize:22,color:'#1a1410',marginBottom:2 }}>{T('contact',lang)}</h3>
            {[[T('full_name',lang),'name','text'],[T('email',lang),'email','email'],[T('phone',lang),'phone','tel']].map(([ph,k,t])=>(
              <div key={k}><label style={lbl}>{ph}</label>
                <input type={t} placeholder={ph} value={form[k]} onChange={e=>up(k,e.target.value)} style={inp}
                  onFocus={e=>e.target.style.borderColor='rgba(140,100,60,0.45)'} onBlur={e=>e.target.style.borderColor='rgba(140,100,60,0.18)'}/>
              </div>
            ))}
          </>}
          {step===1&&<>
            <h3 style={{ fontFamily:"'Fraunces',serif",fontSize:22,color:'#1a1410',marginBottom:2 }}>{T('delivery',lang)}</h3>
            {/* Delivery kind switcher */}

            </div>
            {/* City — common to both */}
            <div><label style={lbl}>{T('city',lang)}</label>
              <input placeholder={T('city',lang)} value={form.city} onChange={e=>up('city',e.target.value)} style={inp}

              <textarea placeholder={T('notes_ph',lang)} value={form.notes} onChange={e=>up('notes',e.target.value)} rows={2}
                style={{...inp, resize:'vertical', minHeight:60, fontFamily:'inherit'}}
                onFocus={e=>e.target.style.borderColor='rgba(140,100,60,0.45)'} onBlur={e=>e.target.style.borderColor='rgba(140,100,60,0.18)'}/>
            </div>
            <p style={{ fontSize:12,color:'rgba(100,72,44,0.55)',lineHeight:1.7,padding:'12px',background:'rgba(140,100,60,0.05)',borderRadius:7 }}>{T('sdek_note',lang)}</p>
          </>}
          {step===2&&<>
            <h3 style={{ fontFamily:"'Fraunces',serif",fontSize:22,color:'#1a1410',marginBottom:2 }}>{T('how_to_contact',lang)}</h3>
            <p style={{ fontSize:12.5,color:'rgba(80,55,22,0.58)',lineHeight:1.7,marginTop:-4 }}>{T('how_to_contact_sub',lang)}</p>
            <div style={{ display:'flex',flexWrap:'wrap',gap:6 }}>
              {channels.map(ch=>(
                <button key={ch.id} onClick={()=>up('contact_method',ch.id)}
                  onMouseEnter={()=>window.__cursor?.hover()} onMouseLeave={()=>window.__cursor?.idle()}
                  style={{ padding:'8px 14px',borderRadius:6,fontSize:12,letterSpacing:'0.04em',background:form.contact_method===ch.id?'rgba(140,100,60,0.14)':'transparent',border:`1px solid ${form.contact_method===ch.id?'rgba(140,100,60,0.50)':'rgba(140,100,60,0.18)'}`,color:form.contact_method===ch.id?'rgba(80,52,18,0.92)':'rgba(100,72,44,0.55)',transition:'all 0.2s',fontFamily:'inherit' }}>{ch.label}</button>
              ))}
            </div>
            <div>
              <label style={lbl}>{channels.find(c=>c.id===form.contact_method)?.label} —&nbsp;{T('your_handle',lang)}</label>
              <input placeholder={channels.find(c=>c.id===form.contact_method)?.ph}
                value={form.contact_value} onChange={e=>up('contact_value',e.target.value)} style={inp}
                onFocus={e=>e.target.style.borderColor='rgba(140,100,60,0.45)'} onBlur={e=>e.target.style.borderColor='rgba(140,100,60,0.18)'}/>
            </div>
            <div style={{ padding:14,background:'rgba(140,100,60,0.06)',borderRadius:8,border:'1px solid rgba(140,100,60,0.10)' }}>
              <p style={{ fontSize:12.5,color:'rgba(80,55,22,0.66)',lineHeight:1.75 }}>{T('payment_explainer',lang)}</p>
            </div>
            <div style={{ borderTop:'1px solid rgba(140,100,60,0.10)',paddingTop:14 }}>
              {cart.map((item,i)=><div key={i} style={{ display:'flex',justifyContent:'space-between',fontSize:12.5,color:'rgba(100,72,44,0.55)',marginBottom:5 }}><span>{item.full}</span><span>€{item.price}</span></div>)}
              <div style={{ display:'flex',justifyContent:'space-between',marginTop:9,fontFamily:"'Fraunces',serif",fontSize:18,color:'#1a1410' }}><span>{T('total',lang)}</span><span>${total}</span></div>
            </div>
          </>}
          {error && <div style={{ padding:'10px 12px',background:'rgba(160,40,40,0.06)',border:'1px solid rgba(160,40,40,0.20)',borderRadius:6,color:'rgba(120,30,30,0.80)',fontSize:12.5 }}>{error}</div>}
          <div style={{ display:'flex',gap:9,marginTop:4 }}>
            {step>0&&<button onClick={()=>setStep(s=>s-1)} disabled={submitting}
              onMouseEnter={e=>{e.currentTarget.style.background='rgba(140,100,60,0.06)';window.__cursor?.hover();}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';window.__cursor?.idle();}}
              style={{ flex:1,padding:'12px 0',border:'1px solid rgba(140,100,60,0.18)',borderRadius:8,color:'rgba(100,72,44,0.62)',fontSize:12,letterSpacing:'0.10em',textTransform:'uppercase',background:'transparent',transition:'background 0.2s',fontFamily:'inherit' }}>{T('back',lang)}</button>}
            <button
              onClick={()=> step<2 ? setStep(s=>s+1) : submitOrder() }
              disabled={!stepValid(step) || submitting}
              onMouseEnter={e=>{ if(stepValid(step)&&!submitting){ e.currentTarget.style.background='rgba(140,100,60,0.14)'; window.__cursor?.hover(); } }}
              onMouseLeave={e=>{ e.currentTarget.style.background='transparent'; window.__cursor?.idle(); }}
              style={{ flex:2,padding:'12px 0',background:'transparent',border:'1px solid rgba(140,100,60,0.38)',borderRadius:8,color:'rgba(80,52,18,0.90)',fontSize:12,letterSpacing:'0.14em',textTransform:'uppercase',transition:'background 0.2s',fontFamily:'inherit',opacity: (!stepValid(step)||submitting) ? 0.45 : 1 }}>
              {submitting ? T('submitting',lang) : (step<2 ? T('continue',lang) : T('send_request',lang))}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   ORDER CONFIRM
════════════════════════════════════════════════════════ */
function OrderConfirm({ onClose, lang }) {
  return (
    <div style={{ position:'fixed',inset:0,zIndex:500,background:'rgba(240,234,224,0.99)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)' }}>
      <div style={{ textAlign:'center',maxWidth:400,padding:48 }}>
        <PearlLogo size={68}/>
        <h2 style={{ fontFamily:"'Fraunces',serif",fontSize:28,color:'#1a1410',marginTop:30,marginBottom:12 }}>{T('order_received',lang)}</h2>
        <p style={{ color:'rgba(80,58,30,0.58)',lineHeight:1.80,fontSize:14 }}>{T('order_thanks',lang)}</p>
        <button onClick={onClose} onMouseEnter={e=>{e.currentTarget.style.background='rgba(140,100,60,0.10)';window.__cursor?.hover();}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';window.__cursor?.idle();}}
          style={{ marginTop:34,padding:'12px 36px',background:'transparent',border:'1px solid rgba(140,100,60,0.30)',borderRadius:8,color:'rgba(90,60,24,0.85)',fontSize:12,letterSpacing:'0.14em',textTransform:'uppercase',transition:'background 0.2s' }}>
          {T('return_shop',lang)}
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   NAV
════════════════════════════════════════════════════════ */
function Nav({ cartCount, onCartOpen, page, setPage, lang, setLang }) {
  const navLink = (key, label) => (
    <button key={key} onClick={()=>setPage(key)}
      onMouseEnter={()=>window.__cursor?.hover()} onMouseLeave={()=>window.__cursor?.idle()}
      style={{ color: page===key?'rgba(80,52,18,0.88)':'rgba(100,72,44,0.44)', fontSize:12.5, letterSpacing:'0.10em', textTransform:'uppercase', background:'none', border:'none', transition:'color 0.2s', fontFamily:'inherit' }}>
      {label}
    </button>
  );
  return (
    <nav className="perle-nav" style={{ position:'fixed',top:0,left:0,right:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 44px',height:66,background:'rgba(243,236,224,0.92)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',borderBottom:'1px solid rgba(140,100,60,0.10)',willChange:'transform' }}>
      <button onClick={()=>setPage('shop')} onMouseEnter={()=>window.__cursor?.hover()} onMouseLeave={()=>window.__cursor?.idle()} style={{ background:'none',border:'none',padding:0 }}>
        <PearlLogo size={38}/>
      </button>
      <div className="perle-nav-links" style={{ display:'flex',gap:28,alignItems:'center' }}>
        {navLink('shop', T('collections',lang))}
        {navLink('about', T('about',lang))}
        {navLink('riga', T('riga',lang))}
        <button onClick={onCartOpen} onMouseEnter={()=>window.__cursor?.hover()} onMouseLeave={()=>window.__cursor?.idle()}
          style={{ position:'relative',color:'rgba(100,72,44,0.65)',fontSize:12.5,letterSpacing:'0.10em',textTransform:'uppercase',background:'none',border:'none',fontFamily:'inherit',transition:'color 0.2s' }}>
          {T('cart',lang)}
          {cartCount>0&&<span style={{ position:'absolute',top:-8,right:-14,width:17,height:17,borderRadius:'50%',background:'rgba(140,100,60,0.72)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9.5,color:'#f3ece0',fontWeight:500 }}>{cartCount}</span>}
        </button>
        <div style={{ display:'flex',gap:6,marginLeft:6 }}>
          {['en','ru','lv'].map(l=>(
            <button key={l} onClick={()=>setLang(l)} onMouseEnter={()=>window.__cursor?.hover()} onMouseLeave={()=>window.__cursor?.idle()}
              style={{ fontSize:11,letterSpacing:'0.06em',textTransform:'uppercase',color:lang===l?'rgba(80,52,18,0.85)':'rgba(100,72,44,0.32)',background:'none',border:'none',fontFamily:'inherit',transition:'color 0.2s',padding:'0 2px' }}>{l}</button>
          ))}
        </div>
      </div>
    </nav>
  );
}

/* ════════════════════════════════════════════════════════
   SHOP PAGE
════════════════════════════════════════════════════════ */
function ShopPage({ lang, onOpen, onAdd }) {
  const products = window.PRODUCTS || [];
  return (
    <div style={{ paddingTop:66 }}>
      <section style={{ minHeight:'50vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'80px 32px 52px',position:'relative',overflow:'hidden' }}>
        {/* ─── Animated pearl glow behind the wordmark ─── */}
        <div style={{ position:'absolute',top:'42%',left:'50%',transform:'translate(-50%,-50%)',width:560,height:560,maxWidth:'92vw',maxHeight:'92vw',pointerEvents:'none',filter:'blur(2px)' }}>
          <div className="perle-glow perle-glow-rose"  style={{ position:'absolute',inset:0,borderRadius:'50%',background:'radial-gradient(circle at 32% 30%, rgba(240,200,212,0.32) 0%, rgba(240,200,212,0) 58%)' }}/>
          <div className="perle-glow perle-glow-azure" style={{ position:'absolute',inset:0,borderRadius:'50%',background:'radial-gradient(circle at 70% 68%, rgba(195,212,236,0.30) 0%, rgba(195,212,236,0) 58%)' }}/>
          <div className="perle-glow perle-glow-lilac" style={{ position:'absolute',inset:0,borderRadius:'50%',background:'radial-gradient(circle at 55% 38%, rgba(220,205,232,0.26) 0%, rgba(220,205,232,0) 56%)' }}/>
          <div className="perle-glow perle-glow-warm"  style={{ position:'absolute',inset:0,borderRadius:'50%',background:'radial-gradient(circle at 42% 72%, rgba(232,200,170,0.18) 0%, rgba(232,200,170,0) 56%)' }}/>
        </div>
        <div style={{ fontSize:10.5,letterSpacing:'0.32em',textTransform:'uppercase',color:'rgba(100,72,44,0.38)',marginBottom:22 }}>{T('hero_tagline',lang)}</div>
        <h1 style={{ fontFamily:"'Fraunces',serif",fontSize:'clamp(50px,7.5vw,90px)',fontWeight:300,fontStyle:'italic',lineHeight:1.0,color:'#1a1410',letterSpacing:'-0.01em' }}>Pērle</h1>
        <p style={{ marginTop:22,maxWidth:400,color:'rgba(80,58,30,0.52)',fontSize:14.5,lineHeight:1.8,fontWeight:300 }}>{T('hero_sub',lang)}</p>
        <a href="#collection" onClick={e=>{e.preventDefault();document.getElementById('collection')?.scrollIntoView({block:'start'});}}
          onMouseEnter={e=>{e.target.style.borderColor='rgba(140,100,60,0.50)';e.target.style.color='rgba(80,52,18,0.88)';window.__cursor?.hover();}}
          onMouseLeave={e=>{e.target.style.borderColor='rgba(140,100,60,0.22)';e.target.style.color='rgba(100,72,44,0.58)';window.__cursor?.idle();}}
          style={{ marginTop:36,padding:'11px 30px',border:'1px solid rgba(140,100,60,0.22)',borderRadius:6,color:'rgba(100,72,44,0.58)',fontSize:11.5,letterSpacing:'0.14em',textTransform:'uppercase',textDecoration:'none',transition:'all 0.3s' }}>
          {T('view_collection',lang)}
        </a>
      </section>
      <section id="collection" style={{ maxWidth:1100,margin:'0 auto',padding:'10px 32px 80px' }}>
        <div style={{ marginBottom:36,display:'flex',alignItems:'baseline',gap:14 }}>
          <h2 style={{ fontFamily:"'Fraunces',serif",fontSize:26,fontWeight:400,fontStyle:'italic',color:'#1a1410' }}>{T('collections',lang)}</h2>
          <span style={{ fontSize:11,color:'rgba(100,72,44,0.32)',letterSpacing:'0.12em',textTransform:'uppercase' }}>— {T('hold_hint',lang)}</span>
        </div>
        <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:22 }}>
          {products.map(p=><ProductCard key={p.id} product={p} onOpen={onOpen} onAdd={onAdd} lang={lang}/>)}
        </div>
      </section>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   ABOUT PAGE
════════════════════════════════════════════════════════ */
function AboutPage({ lang }) {
  const t = k => T(k, lang);
  const mats = window.I18N?.[lang]?.about_mats || [];
  const sec = (title, body) => (
    <div style={{ paddingTop:40, borderTop:'1px solid rgba(140,100,60,0.10)' }}>
      <div style={{ fontSize:10.5,letterSpacing:'0.24em',textTransform:'uppercase',color:'rgba(100,72,44,0.38)',marginBottom:14 }}>{title}</div>
      <p style={{ color:'rgba(60,42,22,0.62)',lineHeight:1.90,fontSize:15,maxWidth:600 }}>{body}</p>
    </div>
  );
  return (
    <div style={{ paddingTop:66 }}>
      <div style={{ maxWidth:760,margin:'0 auto',padding:'72px 40px 100px' }}>
        <h1 style={{ fontFamily:"'Fraunces',serif",fontSize:'clamp(38px,5vw,62px)',fontWeight:300,fontStyle:'italic',color:'#1a1410',lineHeight:1.1,marginBottom:52 }}>{t('about_title')}</h1>
        {sec(t('about_s1'), t('about_p1'))}
        {sec(t('about_s2'), t('about_p2'))}
        {sec(t('about_s3'), t('about_p3'))}
        <div style={{ marginTop:52,padding:32,background:'#ede4d4',borderRadius:14 }}>
          <div style={{ fontSize:10.5,letterSpacing:'0.22em',textTransform:'uppercase',color:'rgba(100,72,44,0.45)',marginBottom:18 }}>{t('about_mat_title')}</div>
          <ul style={{ listStyle:'none',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px 24px' }}>
            {mats.map((m,i)=>(
              <li key={i} style={{ display:'flex',gap:10,alignItems:'center',color:'rgba(70,50,24,0.62)',fontSize:13.5 }}>
                <span style={{ width:4,height:4,borderRadius:'50%',background:'rgba(180,140,80,0.55)',flexShrink:0 }}/>
                {m}
              </li>
            ))}
          </ul>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   RIGA PAGE
════════════════════════════════════════════════════════ */
function RigaPage({ lang }) {
  const t = k => T(k, lang);
  return (
    <div style={{ paddingTop:66 }}>
      <div style={{ maxWidth:760,margin:'0 auto',padding:'72px 40px 100px' }}>
        <div style={{ fontSize:10.5,letterSpacing:'0.28em',textTransform:'uppercase',color:'rgba(100,72,44,0.36)',marginBottom:16 }}>59°N · 24°E</div>
        <h1 style={{ fontFamily:"'Fraunces',serif",fontSize:'clamp(38px,5vw,62px)',fontWeight:300,fontStyle:'italic',color:'#1a1410',lineHeight:1.1,marginBottom:8 }}>{t('riga_title')}</h1>
        <p style={{ fontFamily:"'Fraunces',serif",fontSize:16,fontStyle:'italic',color:'rgba(100,72,44,0.50)',marginBottom:52,lineHeight:1.5 }}>{t('riga_sub')}</p>
        {[['riga_p1'],['riga_p2'],['riga_p3']].map(([k],i)=>(
          <div key={k} style={{ paddingTop:i===0?0:36, marginTop:i===0?0:36, borderTop: i===0?'none':'1px solid rgba(140,100,60,0.10)' }}>
            <p style={{ color:'rgba(60,42,22,0.62)',lineHeight:1.90,fontSize:15,maxWidth:600 }}>{t(k)}</p>
          </div>
        ))}
        <div style={{ marginTop:56,display:'flex',alignItems:'center',gap:18 }}>
          <PearlLogo size={52}/>
          <div>
            <div style={{ fontFamily:"'Fraunces',serif",fontSize:22,fontStyle:'italic',color:'#1a1410' }}>Pērle</div>
            <div style={{ fontSize:11,letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(100,72,44,0.40)',marginTop:3 }}>Est. 2026 · Riga, Latvia</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════════════════ */
function App() {
  const [lang,    setLang]    = useState('en');
  const [page,    setPage]    = useState('shop');
  const [cart,    setCart]    = useState([]);
  const [cartOpen,setCartOpen]= useState(false);
  const [checkout,setCheckout]= useState(false);
  const [confirmed,setConfirmed]=useState(false);
  const [modal,   setModal]   = useState(null);

  const addToCart = p => setCart(c=>[...c,p]);
  const removeFromCart = i => setCart(c=>c.filter((_,idx)=>idx!==i));

  return (
    <>
      <Cursor/>
      <Nav cartCount={cart.length} onCartOpen={()=>setCartOpen(true)} page={page} setPage={setPage} lang={lang} setLang={setLang}/>
      <main>
        {page==='shop'  && <ShopPage lang={lang} onOpen={setModal} onAdd={addToCart}/>}
        {page==='about' && <AboutPage lang={lang}/>}
        {page==='riga'  && <RigaPage lang={lang}/>}
      </main>
      <footer style={{ borderTop:'1px solid rgba(140,100,60,0.10)',padding:'26px 44px',display:'flex',justifyContent:'space-between',alignItems:'center',color:'rgba(100,72,44,0.30)',fontSize:11.5,letterSpacing:'0.07em' }}>
        <div style={{ display:'flex',alignItems:'center',gap:10 }}><PearlLogo size={22}/><span>{T('footer',lang)}</span></div>
        <span>perle-riga.com</span>
      </footer>
      <ProductModal product={modal} onClose={()=>setModal(null)} onAdd={addToCart} lang={lang}/>
      <CartSidebar cart={cart} open={cartOpen} onClose={()=>setCartOpen(false)} onRemove={removeFromCart} onCheckout={()=>{setCartOpen(false);setCheckout(true);}} lang={lang}/>
      {checkout&&!confirmed&&<Checkout cart={cart} onClose={()=>setCheckout(false)} onComplete={()=>{setCheckout(false);setConfirmed(true);setCart([]);}} lang={lang}/>}
      {confirmed&&<OrderConfirm onClose={()=>setConfirmed(false)} lang={lang}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
