<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, memo } = React;
const T = (k, lang) => (window.I18N?.[lang]?.[k]) ?? k;
// Use _PRICE_FN (not PRICE) to avoid shadowing window.PRICE in this scope —
// Babel's inline script runs in a context where `const PRICE = ...` was overwriting
// window.PRICE itself, causing the helper to call itself recursively.
const _PRICE_FN = window.PRICE;

function lum(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  return 0.299*r + 0.587*g + 0.114*b;
}
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

/* ════════════════════════════════════════════════════════════════
   CURSOR — pearl follows the mouse
═════════════════════════════════════════════════════════════════ */
function Cursor() {
  const ref = useRef(null);
  const sizeRef = useRef(13);     // current size — mutated, doesn't trigger re-subscribe
  const lastPos = useRef({ x:0, y:0 });
  const [, force] = useState(0);   // force re-render only when style changes
  const [filled, setFilled] = useState(false);

  // Position tracker — subscribed ONCE, never re-subscribed.
  // Listens to pointermove (covers both mouse and stylus). Touch is excluded
  // since our cursor is hidden on touch devices via .pearl-cursor media query.
  useEffect(() => {
    const apply = (clientX, clientY) => {
      lastPos.current = { x: clientX, y: clientY };
      if (ref.current) {
        const s = sizeRef.current;
        ref.current.style.transform = `translate(${clientX - s/2}px,${clientY - s/2}px)`;
      }
    };
    const onPointer = e => apply(e.clientX, e.clientY);
    window.addEventListener('pointermove', onPointer, { passive: true });
    // Mouse fallback in case pointer events are filtered upstream
    const onMouse = e => apply(e.clientX, e.clientY);
    window.addEventListener('mousemove', onMouse, { passive: true });
    window.__cursor = {
      idle:  () => { sizeRef.current = 13; setFilled(false); apply(lastPos.current.x, lastPos.current.y); force(n=>n+1); },
      hover: () => { sizeRef.current = 20; setFilled(false); apply(lastPos.current.x, lastPos.current.y); force(n=>n+1); },
      grab:  () => { sizeRef.current = 28; setFilled(true);  apply(lastPos.current.x, lastPos.current.y); force(n=>n+1); },
    };
    return () => {
      window.removeEventListener('pointermove', onPointer);
      window.removeEventListener('mousemove',   onMouse);
    };
  }, []);

  const size = sizeRef.current;
  return <div ref={ref} className="pearl-cursor no-select" style={{
    position:'fixed', top:0, left:0, width:size, height:size, pointerEvents:'none',
    zIndex:9999, borderRadius:'50%',
    background: filled
      ? 'radial-gradient(circle at 35% 30%, #fce8ec, #d4b8bc 70%)'
      : 'radial-gradient(circle at 35% 30%, rgba(252,232,236,0.9), rgba(212,184,188,0.45) 80%)',
    boxShadow: filled ? '0 2px 8px rgba(100,70,50,0.22)' : 'none',
    border: '0.8px solid rgba(180,155,130,0.40)',
    transition: 'width 0.18s, height 0.18s, background 0.18s',
  }}/>;
}

/* ════════════════════════════════════════════════════════════════
   PEARL LOGO
═════════════════════════════════════════════════════════════════ */
function PearlLogo({ size = 42, withText = false }) {
  const [hov, setHov] = useState(false);
  return (
    <div onMouseEnter={() => { setHov(true); window.__cursor?.hover(); }}
         onMouseLeave={() => { setHov(false); window.__cursor?.idle(); }}
         style={{ display:'inline-flex', alignItems:'center', gap:11, lineHeight:0 }}>
      <svg width={size} height={size} viewBox="0 0 100 100" style={{ flexShrink:0, display:'block' }}>
        <defs>
          <radialGradient id="lf" cx="34%" cy="24%" r="72%">
            <stop offset="0%"   stopColor="#fce8ec"/>
            <stop offset="18%"  stopColor="#eed4dc"/>
            <stop offset="44%"  stopColor="#d4c0d2"/>
            <stop offset="70%"  stopColor="#c0bcd6"/>
            <stop offset="100%" stopColor="#d4b8bc"/>
          </radialGradient>
          <radialGradient id="lhl" cx="28%" cy="20%" r="42%">
            <stop offset="0%"   stopColor="rgba(255,252,252,0.95)"/>
            <stop offset="100%" stopColor="rgba(255,252,252,0)"/>
          </radialGradient>
          <radialGradient id="lsh" cx="68%" cy="72%" r="40%">
            <stop offset="0%"   stopColor="rgba(172,204,232,0.60)"/>
            <stop offset="100%" stopColor="rgba(172,204,232,0)"/>
          </radialGradient>
          <radialGradient id="lrose" cx="75%" cy="22%" r="36%">
            <stop offset="0%"   stopColor="rgba(240,190,208,0.55)"/>
            <stop offset="100%" stopColor="rgba(240,190,208,0)"/>
          </radialGradient>
        </defs>
        <circle cx="50" cy="50" r="46" fill="url(#lf)" filter="url(#pearl-sand)"/>
        <circle cx="50" cy="50" r="46" fill="url(#lhl)"/>
        <circle cx="50" cy="50" r="46" fill="url(#lsh)" style={{ opacity: hov ? 1 : 0.3, transition:'opacity 0.7s ease' }}/>
        <circle cx="50" cy="50" r="46" fill="url(#lrose)" style={{ opacity: hov ? 1 : 0.2, transition:'opacity 0.9s ease' }}/>
        <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(210,175,182,0.38)" strokeWidth="1.5"/>
      </svg>
      {withText && (
        <span style={{ fontFamily:"'Fraunces',serif", fontSize:size*0.62, fontStyle:'italic', fontWeight:400, color:'#1a1410', letterSpacing:'0.01em' }}>Pērle</span>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   WALLET SVG PLACEHOLDERS — simple shapes, only used when no photo
═════════════════════════════════════════════════════════════════ */
const _WalletSVG = memo(function _WalletSVG({ type, color }) {
  const c = color.svg;
  const light = lum(c.base) > 0.28;
  const stitch = light ? 'rgba(70,50,28,0.18)' : 'rgba(215,195,170,0.20)';
  const mark   = light ? 'rgba(70,50,28,0.42)' : 'rgba(210,190,165,0.42)';

  if (type === 'cardholder') {
    return (
      <svg viewBox="0 0 200 200" style={{ width:'78%', height:'auto', display:'block' }}>
        <defs>
          <linearGradient id={`cg${c.base.replace('#','')}`} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stopColor={c.hi}/>
            <stop offset="50%"  stopColor={c.base}/>
            <stop offset="100%" stopColor={c.dk}/>
          </linearGradient>
        </defs>
        <rect x="14" y="14" width="172" height="172" rx="9" fill={`url(#cg${c.base.replace('#','')})`}/>
        <rect x="14" y="14" width="172" height="172" rx="9" fill="none" stroke={stitch} strokeWidth="0.7" strokeDasharray="2,2.4"/>
        <text x="100" y="106" textAnchor="middle" fontFamily="'Fraunces',serif" fontStyle="italic" fontSize="22" fill={mark}>Pērle</text>
      </svg>
    );
  }
  // bifold
  return (
    <svg viewBox="0 0 260 170" style={{ width:'78%', height:'auto', display:'block' }}>
      <defs>
        <linearGradient id={`bg${c.base.replace('#','')}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"   stopColor={c.hi}/>
          <stop offset="50%"  stopColor={c.base}/>
          <stop offset="100%" stopColor={c.dk}/>
        </linearGradient>
      </defs>
      <rect x="14" y="20" width="232" height="130" rx="9" fill={`url(#bg${c.base.replace('#','')})`}/>
      <rect x="14" y="20" width="232" height="130" rx="9" fill="none" stroke={stitch} strokeWidth="0.7" strokeDasharray="2,2.4"/>
      <line x1="130" y1="22" x2="130" y2="148" stroke={stitch} strokeWidth="0.5"/>
      <text x="76" y="92" textAnchor="middle" fontFamily="'Fraunces',serif" fontStyle="italic" fontSize="18" fill={mark}>Pērle</text>
    </svg>
  );
});

/* ════════════════════════════════════════════════════════════════
   DRAG-AND-SPRING physics — critical damping, tilt from velocity+grab
═════════════════════════════════════════════════════════════════ */
function useDragSpring({ onTap, disabled, onDropToCart }) {
  // onDropToCart(rect): called when finger/cursor is released over the cart icon
  //   rect — DOMRect of the cart target the wallet should fly to
  const el = useRef(null);
  const ph = useRef({ x:0, y:0, vx:0, vy:0 });
  const tg = useRef({ x:0, y:0 });
  const grabOff = useRef({ x:0, y:0 });   // offset of grab point from card center, normalized to [-1, 1]
  const dr = useRef(false);
  const mv = useRef(false);                // moved more than tap-tolerance
  const downPos = useRef({ x:0, y:0 });    // pointer-down screen position
  const heldFlag = useRef(false);
  const holdTimer = useRef(null);
  const raf = useRef(null);
  const activePointerId = useRef(null);
  const lastPointer = useRef({ x:0, y:0 });
  const [disp, setDisp] = useState({ x:0, y:0 });
  const [tilt, setTilt] = useState({ rx:0, ry:0, rz:0 }); // 3D rotation: rx=front-back, ry=left-right, rz=plane swing
  const [isDragging, setIsDragging] = useState(false);
  const [isHeld, setIsHeld] = useState(false);
  const [overCart, setOverCart] = useState(false);

  const TAP_TOLERANCE = 6;  // px — finger jitter on touch screens

  // Helper: detect if pointer is over the cart drop zone
  const detectCartDrop = useCallback((clientX, clientY) => {
    const target = document.querySelector('[data-cart-drop-target]');
    if (!target) return null;
    const r = target.getBoundingClientRect();
    if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) return r;
    return null;
  }, []);

  const tick = useCallback(() => {
    const p = ph.current, t = tg.current;
    const k = dr.current ? 0.16 : 0.10;
    const d = dr.current ? 0.84 : 0.86;
    p.vx = (p.vx + (t.x - p.x) * k) * d;
    p.vy = (p.vy + (t.y - p.y) * k) * d;
    p.x += p.vx;
    p.y += p.vy;
    setDisp({ x: p.x, y: p.y });
    // 3D tilt physics — calm version. Wallet leans gently into motion, no jitter.
    //  • ry (left-right turn): horizontal velocity → wallet faces direction of motion
    //  • rx (forward-back tilt): vertical velocity → small lean
    //  • rz (in-plane swing): only from grab-offset, no velocity contribution
    //    (velocity in rz was the main source of jitter)
    const speedY = clamp(p.vx * 0.45, -7, 7);
    const speedX = clamp(-p.vy * 0.35, -5, 5);
    const swingZ = dr.current ? clamp(grabOff.current.x * 2.2, -5, 5) : 0;
    setTilt({ rx: speedX, ry: speedY, rz: swingZ });
    const settled = !dr.current
      && Math.abs(p.vx) < 0.05 && Math.abs(p.vy) < 0.05
      && Math.abs(t.x - p.x) < 0.08 && Math.abs(t.y - p.y) < 0.08;
    if (!settled) raf.current = requestAnimationFrame(tick);
    else {
      p.x = 0; p.y = 0; p.vx = 0; p.vy = 0;
      setDisp({ x:0, y:0 });
      setTilt({ rx:0, ry:0, rz:0 });
      raf.current = null;
    }
  }, []);

  const endDrag = useCallback((mayTap) => {
    if (!dr.current) return;
    dr.current = false;
    if (holdTimer.current) { clearTimeout(holdTimer.current); holdTimer.current = null; }
    setIsDragging(false);
    setIsHeld(false);
    setOverCart(false);
    window.__cursor?.hover();
    tg.current = { x:0, y:0 };
    document.body.style.overflow = '';
    document.body.style.touchAction = '';
    if (el.current && activePointerId.current != null) {
      try { el.current.releasePointerCapture(activePointerId.current); } catch (_) {}
    }
    // Cart-drop detection at release point
    const dropRect = detectCartDrop(lastPointer.current.x, lastPointer.current.y);
    if (dropRect && onDropToCart) {
      onDropToCart(dropRect);
      activePointerId.current = null;
      // Don't run spring tick — wallet is now flying to the cart, handled by caller
      return;
    }
    activePointerId.current = null;
    // Tap fires only when: didn't move beyond tolerance, and wasn't a long hold
    if (mayTap && !mv.current && !heldFlag.current) onTap?.();
    if (!raf.current) raf.current = requestAnimationFrame(tick);
  }, [tick, onTap, onDropToCart, detectCartDrop]);

  const onPointerDown = useCallback(e => {
    if (disabled) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (dr.current) return;

    e.preventDefault();
    const rect = el.current.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top  + rect.height/2;
    grabOff.current = {
      x: clamp((e.clientX - cx) / (rect.width  / 2 || 1), -1, 1),
      y: clamp((e.clientY - cy) / (rect.height / 2 || 1), -1, 1),
    };
    downPos.current = { x: e.clientX, y: e.clientY };
    lastPointer.current = { x: e.clientX, y: e.clientY };
    dr.current = true; mv.current = false; heldFlag.current = false;
    holdTimer.current = setTimeout(() => { heldFlag.current = true; setIsHeld(true); }, 180);
    setIsDragging(true);
    setOverCart(false);
    window.__cursor?.grab();
    activePointerId.current = e.pointerId;
    document.body.style.overflow = 'hidden';
    document.body.style.touchAction = 'none';
    if (raf.current) cancelAnimationFrame(raf.current);
    raf.current = requestAnimationFrame(tick);
    try { el.current.setPointerCapture(e.pointerId); } catch (_) {}
    // Tell other components a drag started
    document.dispatchEvent(new CustomEvent('perle-drag-start'));
  }, [tick, disabled]);

  useEffect(() => {
    const onMove = e => {
      if (!dr.current) return;
      if (activePointerId.current != null && e.pointerId !== activePointerId.current) return;
      // Tap-tolerance: only mark "moved" if finger has gone beyond TAP_TOLERANCE from down position
      const dx = e.clientX - downPos.current.x;
      const dy = e.clientY - downPos.current.y;
      if (Math.hypot(dx, dy) > TAP_TOLERANCE) mv.current = true;
      lastPointer.current = { x: e.clientX, y: e.clientY };
      const rect = el.current.getBoundingClientRect();
      const cx = rect.left + rect.width/2 - ph.current.x;
      const cy = rect.top  + rect.height/2 - ph.current.y;
      tg.current = {
        x: e.clientX - cx - grabOff.current.x * (rect.width  / 2),
        y: e.clientY - cy - grabOff.current.y * (rect.height / 2),
      };
      // Live cart-zone detection — visual feedback while dragging
      const dropRect = detectCartDrop(e.clientX, e.clientY);
      setOverCart(!!dropRect);
    };
    const onUp = (e) => {
      if (activePointerId.current != null && e && e.pointerId !== activePointerId.current) return;
      endDrag(true);
      document.dispatchEvent(new CustomEvent('perle-drag-end'));
    };
    const onCancel = (e) => {
      if (activePointerId.current != null && e && e.pointerId !== activePointerId.current) return;
      endDrag(false);
      document.dispatchEvent(new CustomEvent('perle-drag-end'));
    };

    const node = el.current;
    if (node) {
      node.addEventListener('pointermove',   onMove);
      node.addEventListener('pointerup',     onUp);
      node.addEventListener('pointercancel', onCancel);
    }
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup',   onUp);
    window.addEventListener('pointercancel', onCancel);
    const onBlur = () => endDrag(false);
    window.addEventListener('blur', onBlur);

    return () => {
      if (node) {
        node.removeEventListener('pointermove',   onMove);
        node.removeEventListener('pointerup',     onUp);
        node.removeEventListener('pointercancel', onCancel);
      }
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup',   onUp);
      window.removeEventListener('pointercancel', onCancel);
      window.removeEventListener('blur', onBlur);
      document.body.style.overflow = '';
      document.body.style.touchAction = '';
    };
  }, [endDrag, detectCartDrop]);

  return { el, disp, tilt, isDragging, isHeld, overCart, onPointerDown };
}

/* ════════════════════════════════════════════════════════════════
   WALLET DISPLAY — handles photo / SVG / hover-ajar / stop-motion
   Used by: ProductCard (closed/ajar), ProductModal (full stop-motion)
═════════════════════════════════════════════════════════════════ */
function WalletDisplay({ product, color, mode = 'closed', framesProgress = 0, onMouseMove, onMouseEnter, onMouseLeave, refExt }) {
  // mode: 'closed' | 'ajar' | 'frames'  (frames = use frames_open[idx])
  // framesProgress: 0..1, position in stop-motion sequence
  const closedSrc = color.photo_closed;
  const ajarSrc   = color.photo_ajar || color.photo_closed;
  const framesArr = color.frames_open || [];
  const haveFrames = framesArr.length > 0;

  const innerRef = useRef(null);
  const setRef = (n) => { innerRef.current = n; if (refExt) refExt.current = n; };

  // Decide what to render
  if (closedSrc) {
    // Photo-based rendering
    let src = closedSrc;
    if (mode === 'ajar') src = ajarSrc;
    else if (mode === 'frames' && haveFrames) {
      const idx = Math.round(clamp(framesProgress, 0, 1) * (framesArr.length - 1));
      src = framesArr[idx];
    }
    return (
      <div ref={setRef}
        onMouseMove={onMouseMove}
        onMouseEnter={onMouseEnter}
        onMouseLeave={onMouseLeave}
        style={{ position:'relative', width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <img src={src} alt={product.full?.ru || product.full?.en || ''}
          draggable={false}
          style={{ maxWidth:'100%', maxHeight:'100%', objectFit:'contain', userSelect:'none', pointerEvents:'none' }}/>
        <div className="grain-overlay"/>
      </div>
    );
  }

  // SVG fallback (no photo yet)
  return (
    <div ref={setRef} style={{ position:'relative', width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <_WalletSVG type={product.type} color={color}/>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   MAGNIFIER — circular zoom on hover (only when real photo present)
═════════════════════════════════════════════════════════════════ */
function Magnifier({ active, photoUrl, container, mouse, size = 130, zoom = 2.4 }) {
  if (!active || !photoUrl || !container || !mouse) return null;
  const rect = container.getBoundingClientRect();
  const x = mouse.x - rect.left;
  const y = mouse.y - rect.top;
  // Clamp inside
  if (x < 0 || y < 0 || x > rect.width || y > rect.height) return null;
  const bgX = -(x * zoom - size/2);
  const bgY = -(y * zoom - size/2);
  return (
    <div style={{
      position:'absolute',
      left: x - size/2,
      top:  y - size/2,
      width: size,
      height: size,
      borderRadius:'50%',
      backgroundImage: `url(${photoUrl})`,
      backgroundRepeat: 'no-repeat',
      backgroundSize: `${rect.width * zoom}px ${rect.height * zoom}px`,
      backgroundPosition: `${bgX}px ${bgY}px`,
      pointerEvents:'none',
      boxShadow: '0 10px 28px rgba(60,30,10,0.30), inset 0 0 0 2px rgba(255,253,250,0.72)',
      border: '1px solid rgba(80,55,30,0.18)',
      zIndex: 5,
    }}/>
  );
}

/* ════════════════════════════════════════════════════════════════
   PRODUCT CARD — drag, hover-ajar, stock indicator, sold-out state,
   3D tilt, drag-to-cart, "flying into cart" animation
═════════════════════════════════════════════════════════════════ */
function _ProductCard({ product, lang, onOpen, onAdd }) {
  const [hov,    setHov]    = useState(false);
  const [colorIdx] = useState(0);
  const color = product.colors[colorIdx];
  const sold = product.stock <= 0;
  const lowStock = product.stock > 0 && product.stock <= 3;

  // "Flying to cart" overlay state — independent of drag spring
  // While flying, we render an absolutely-positioned ghost wallet that
  // animates from its current position+size down to the cart icon.
  const [flying, setFlying] = useState(null); // null | { fromRect, toRect }
  const cardRef = useRef(null);

  const handleDropToCart = useCallback((toRect) => {
    if (!cardRef.current) return;
    const fromRect = cardRef.current.getBoundingClientRect();
    setFlying({ fromRect, toRect });
    // Add to cart with selected color — preserves color choice as you wanted
    onAdd(product, color);
    // Remove the flying ghost after the animation finishes
    setTimeout(() => setFlying(null), 620);
  }, [onAdd, product, color]);

  const { el, disp, tilt, isDragging, isHeld, overCart, onPointerDown } = useDragSpring({
    onTap: () => onOpen(product),
    disabled: sold,
    onDropToCart: handleDropToCart,
  });

  const animating = Math.abs(disp.x) > 0.3 || Math.abs(disp.y) > 0.3;
  const liftedScale = isDragging ? (overCart ? 0.78 : 1.06) : 1;

  return (
    <div ref={cardRef} style={{
      position:'relative', background:'#ede4d4', borderRadius:14, overflow:'visible',
      boxShadow: hov ? '0 6px 22px rgba(100,70,40,0.12)'
              :        '0 2px 10px rgba(100,70,40,0.07)',
      transition:'box-shadow 0.3s',
      zIndex: (isDragging || animating) ? 150 : 1,
      opacity: sold ? 0.55 : 1,
      filter:  sold ? 'grayscale(0.8)' : 'none',
      // Perspective for 3D tilt of the wallet inside
      perspective: 900,
    }}
    onMouseEnter={() => { setHov(true); window.__cursor?.hover(); }}
    onMouseLeave={() => { setHov(false); window.__cursor?.idle(); }}>

      {/* Drag layer — the wallet image */}
      <div
        ref={el}
        onPointerDown={onPointerDown}
        className="no-select"
        style={{
          transform: [
            `translate(${disp.x}px,${disp.y}px)`,
            `scale(${liftedScale})`,
            `rotateX(${tilt.rx}deg)`,
            `rotateY(${tilt.ry}deg)`,
            `rotateZ(${tilt.rz}deg)`,
          ].join(' '),
          transformStyle: 'preserve-3d',
          transformOrigin: 'center center',
          willChange: (isDragging || animating) ? 'transform' : 'auto',
          padding: '30px 24px 22px',
          display: 'flex', justifyContent: 'center',
          minHeight: 200,
          touchAction: 'none',
          // Hide the original while flying to cart
          opacity: flying ? 0 : 1,
        }}>
        <div style={{ width:'100%', maxWidth:240, aspectRatio:'1/1', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <WalletDisplay product={product} color={color} mode={(hov && !isDragging) ? 'ajar' : 'closed'}/>
        </div>
      </div>

      {/* Card text + Add button */}
      <div style={{ padding:'0 24px 24px', position:'relative' }}>
        <div style={{ fontFamily:"'Fraunces',serif", fontSize:18, marginBottom:2, color:'#1a1410' }}>
          {product.full?.[lang] || product.full?.en}
        </div>
        <div style={{ fontSize:11, color:'rgba(100,72,44,0.55)', letterSpacing:'0.02em', marginBottom:10 }}>
          {product.dims}
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:10 }}>
          <div style={{ fontFamily:"'Fraunces',serif", fontSize:17, color:'#1a1410' }}>{_PRICE_FN(product, lang)}</div>
          {sold ? (
            <div style={{ fontSize:11, letterSpacing:'0.10em', textTransform:'uppercase', color:'rgba(120,40,40,0.70)', padding:'7px 12px' }}>
              {T('sold_out', lang)}
            </div>
          ) : (
            <button onClick={(e) => { e.stopPropagation(); onAdd(product, color); }}
              onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
              style={{ background:'transparent', border:'1px solid rgba(140,100,60,0.30)', borderRadius:6,
                padding:'7px 13px', fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase',
                color:'rgba(80,52,18,0.85)', fontFamily:'inherit', cursor:'none' }}>
              {T('add_cart', lang)}
            </button>
          )}
        </div>
        {lowStock && (
          <div style={{ marginTop:8, fontSize:11, color:'rgba(120,80,40,0.78)', letterSpacing:'0.04em' }}>
            {T('stock_left', lang)} {product.stock} {lang==='ru'?'шт.':lang==='lv'?'gab.':'left'}
          </div>
        )}
      </div>

      {/* Flying-to-cart ghost: rendered as a fixed element so it can fly across the page */}
      {flying && <FlyingWalletGhost product={product} color={color} from={flying.fromRect} to={flying.toRect}/>}
    </div>
  );
}
// Memoize to prevent the non-dragged card from re-rendering when its sibling moves
const ProductCard = memo(_ProductCard);

/* ════════════════════════════════════════════════════════════════
   FLYING WALLET GHOST — renders the wallet flying from card to cart.
   Uses CSS transition (transform + opacity) for one-shot animation.
═════════════════════════════════════════════════════════════════ */
function FlyingWalletGhost({ product, color, from, to }) {
  const [phase, setPhase] = useState('start');
  useEffect(() => {
    // Two RAFs to ensure 'start' frame paints before we transition to 'end'
    const r1 = requestAnimationFrame(() => {
      const r2 = requestAnimationFrame(() => setPhase('end'));
      return () => cancelAnimationFrame(r2);
    });
    return () => cancelAnimationFrame(r1);
  }, []);
  // From rect (origin) → To rect (cart icon) translation
  const dx = (to.left + to.width/2) - (from.left + from.width/2);
  const dy = (to.top  + to.height/2) - (from.top  + from.height/2);
  // Scale down to roughly the cart icon size
  const scale = Math.min(to.width, to.height) / Math.max(from.width, from.height) * 0.85;
  const baseStyle = {
    position: 'fixed',
    left: from.left,
    top: from.top,
    width: from.width,
    height: from.height,
    pointerEvents: 'none',
    zIndex: 200,
    transformOrigin: 'center center',
    transition: 'transform 0.55s cubic-bezier(0.45, 0, 0.55, 1), opacity 0.55s ease-out',
    willChange: 'transform, opacity',
  };
  const transform = phase === 'start'
    ? 'translate(0, 0) scale(1) rotate(0deg)'
    : `translate(${dx}px, ${dy}px) scale(${scale}) rotate(-12deg)`;
  const opacity = phase === 'start' ? 1 : 0;
  return (
    <div style={{ ...baseStyle, transform, opacity, display:'flex', alignItems:'center', justifyContent:'center', padding:'30px 24px 22px' }}>
      <div style={{ width:'100%', maxWidth:240, aspectRatio:'1/1', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <WalletDisplay product={product} color={color} mode="closed"/>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   PRODUCT MODAL — color swatches, stop-motion, magnifier, qualities
═════════════════════════════════════════════════════════════════ */
function ProductModal({ product, onClose, onAdd, lang }) {
  if (!product) return null;
  const [colorIdx, setColorIdx] = useState(0);
  const color = product.colors[colorIdx];
  const desc = product.desc?.[lang] || product.desc?.en || '';
  const qualities = product.qualities?.[lang] || product.qualities?.en || [];
  const sold = product.stock <= 0;

  const haveFrames = (color.frames_open || []).length > 0;
  const havePhotos = !!color.photo_closed;

  // Stop-motion progress (0..1). 0 = closed, 1 = fully open
  const [progress, setProgress] = useState(0);
  const animRaf = useRef(null);
  const animStart = useRef(0);
  const animFrom = useRef(0);
  const animTo = useRef(1);

  const animateTo = useCallback((target, duration = 480) => {
    if (animRaf.current) cancelAnimationFrame(animRaf.current);
    animFrom.current = progress;
    animTo.current = target;
    animStart.current = performance.now();
    const tick = (now) => {
      const t = clamp((now - animStart.current) / duration, 0, 1);
      const eased = animTo.current > animFrom.current
        ? 1 - Math.pow(1 - t, 2)        // ease-out for opening
        : Math.pow(t, 2);                // ease-in for closing
      const v = animFrom.current + (animTo.current - animFrom.current) * eased;
      setProgress(v);
      if (t < 1) animRaf.current = requestAnimationFrame(tick);
      else animRaf.current = null;
    };
    animRaf.current = requestAnimationFrame(tick);
  }, [progress]);

  // On mount: animate from closed → open
  useEffect(() => {
    if (haveFrames) animateTo(1, 600);
    return () => { if (animRaf.current) cancelAnimationFrame(animRaf.current); };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // When color changes, reset to open state
  useEffect(() => {
    if (haveFrames) {
      setProgress(0);
      requestAnimationFrame(() => animateTo(1, 500));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [colorIdx]);

  const onPhotoClick = () => {
    if (!haveFrames) return;
    if (progress > 0.5) animateTo(0, 480);     // currently open → close
    else                animateTo(1, 480);     // currently closed → open
  };

  // Magnifier state
  const photoBoxRef = useRef(null);
  const [mouse, setMouse] = useState(null);
  const [magActive, setMagActive] = useState(false);
  // Current visible photo URL (for magnifier)
  const currentPhotoUrl = useMemo(() => {
    if (!havePhotos) return null;
    if (!haveFrames) return color.photo_closed;
    const idx = Math.round(progress * (color.frames_open.length - 1));
    return color.frames_open[idx];
  }, [havePhotos, haveFrames, progress, color]);

  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(20,14,8,0.78)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div onClick={e => e.stopPropagation()} className="perle-modal-card" style={{ background:'#f3ece0', borderRadius:18, maxWidth:820, width:'100%', display:'flex', overflow:'hidden', boxShadow:'0 40px 90px rgba(60,30,10,0.30)', maxHeight:'90vh' }}>

        {/* IMAGE SIDE */}
        <div className="perle-modal-img" style={{ flex:'0 0 auto', background:'#ede4d4', display:'flex', alignItems:'center', justifyContent:'center', padding:48, position:'relative', minHeight:340, width:'min(46%, 380px)' }}
          onClick={onPhotoClick}>
          <div ref={photoBoxRef}
            onMouseEnter={() => { setMagActive(havePhotos); }}
            onMouseLeave={() => { setMagActive(false); setMouse(null); }}
            onMouseMove={(e) => setMouse({ x: e.clientX, y: e.clientY })}
            style={{ position:'relative', width:'100%', aspectRatio:'1/1', maxWidth:320, display:'flex', alignItems:'center', justifyContent:'center' }}>
            <WalletDisplay product={product} color={color} mode={haveFrames ? 'frames' : 'closed'} framesProgress={progress}/>
            <Magnifier active={magActive} photoUrl={currentPhotoUrl} container={photoBoxRef.current} mouse={mouse}/>
          </div>
        </div>

        {/* TEXT SIDE */}
        <div style={{ flex:1, padding:'30px 36px 32px', display:'flex', flexDirection:'column', gap:14, overflowY:'auto' }}>
          <button onClick={() => { window.__cursor?.idle(); onClose(); }}
            onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
            style={{ alignSelf:'flex-end', color:'rgba(100,72,44,0.45)', fontSize:22, lineHeight:1, marginBottom:-8, background:'none', border:'none', padding:0, fontFamily:'inherit' }}>✕</button>

          <div style={{ fontSize:10, letterSpacing:'0.20em', textTransform:'uppercase', color:'rgba(100,72,44,0.55)' }}>
            Pērle · {color.name?.[lang] || color.name?.en}
          </div>
          <h2 style={{ fontFamily:"'Fraunces',serif", fontSize:30, lineHeight:1.15, fontWeight:400, color:'#1a1410' }}>
            {product.full?.[lang] || product.full?.en}
          </h2>
          <div style={{ fontSize:12, color:'rgba(100,72,44,0.60)', letterSpacing:'0.04em' }}>
            {product.dims}
          </div>

          {/* Color swatches */}
          {product.colors.length > 1 && (
            <div style={{ display:'flex', alignItems:'center', gap:10, marginTop:4 }}>
              <span style={{ fontSize:10.5, letterSpacing:'0.12em', textTransform:'uppercase', color:'rgba(100,72,44,0.50)' }}>{T('color', lang)}</span>
              <div style={{ display:'flex', gap:8 }}>
                {product.colors.map((cl, i) => (
                  <button key={cl.id} onClick={() => setColorIdx(i)}
                    onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
                    title={cl.name?.[lang] || cl.name?.en}
                    style={{
                      width:24, height:24, borderRadius:'50%',
                      background: cl.hex,
                      border: i === colorIdx ? '2px solid rgba(80,52,18,0.85)' : '1px solid rgba(140,100,60,0.20)',
                      boxShadow: i === colorIdx ? '0 0 0 3px rgba(140,100,60,0.10)' : 'none',
                      padding:0, cursor:'none', transition:'all 0.18s',
                    }}/>
                ))}
              </div>
            </div>
          )}

          <p style={{ fontSize:13.5, lineHeight:1.75, color:'rgba(60,40,22,0.84)', marginTop:6 }}>{desc}</p>

          {/* Qualities — moved here from About */}
          <div style={{ marginTop:6, paddingTop:14, borderTop:'1px solid rgba(140,100,60,0.12)' }}>
            <div style={{ fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase', color:'rgba(100,72,44,0.55)', marginBottom:10 }}>
              Pērle · 2026
            </div>
            <ul style={{ listStyle:'none', display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px 16px' }}>
              {qualities.map((q, i) => (
                <li key={i} style={{ fontSize:12.5, color:'rgba(60,40,22,0.75)', display:'flex', alignItems:'flex-start', gap:8 }}>
                  <span style={{ width:4, height:4, borderRadius:'50%', background:'rgba(140,100,60,0.55)', marginTop:7, flexShrink:0 }}/>
                  {q}
                </li>
              ))}
            </ul>
          </div>

          {/* Price + add */}
          <div style={{ marginTop:'auto', paddingTop:18, display:'flex', alignItems:'center', justifyContent:'space-between', gap:14 }}>
            <div style={{ fontFamily:"'Fraunces',serif", fontSize:24, color:'#1a1410' }}>{_PRICE_FN(product, lang)}</div>
            {sold ? (
              <div style={{ fontSize:12, letterSpacing:'0.14em', textTransform:'uppercase', color:'rgba(120,40,40,0.70)' }}>{T('sold_out', lang)}</div>
            ) : (
              <button onClick={() => { onAdd(product, color); onClose(); }}
                onMouseEnter={(e) => { e.currentTarget.style.background='rgba(140,100,60,0.14)'; window.__cursor?.hover(); }}
                onMouseLeave={(e) => { e.currentTarget.style.background='transparent'; window.__cursor?.idle(); }}
                style={{ padding:'12px 22px', background:'transparent', border:'1px solid rgba(140,100,60,0.40)', borderRadius:8,
                  color:'rgba(80,52,18,0.92)', fontSize:11.5, letterSpacing:'0.16em', textTransform:'uppercase',
                  fontFamily:'inherit', transition:'background 0.2s' }}>
                {T('add_cart', lang)}
              </button>
            )}
          </div>
          <div style={{ fontSize:11, color:'rgba(100,72,44,0.50)', textAlign:'center' }}>
            {T('free_shipping', lang)}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   CART SIDEBAR
═════════════════════════════════════════════════════════════════ */
function CartSidebar({ cart, open, onClose, onCheckout, onRemove, lang }) {
  // Lazy mount: only render when open OR while closing animation is in progress
  const [mounted, setMounted] = useState(open);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (open) {
      setMounted(true);
      // next frame: trigger transition
      requestAnimationFrame(() => requestAnimationFrame(() => setVisible(true)));
    } else if (mounted) {
      setVisible(false);
      const t = setTimeout(() => setMounted(false), 380);  // matches transition duration
      return () => clearTimeout(t);
    }
  }, [open]);
  if (!mounted) return null;

  // Sum: lang-aware (rub or eur)
  const totalRub = cart.reduce((s,i) => s + (i.price.rub || 0), 0);
  const totalEur = cart.reduce((s,i) => s + (i.price.eur || 0), 0);
  const totalDisplay = lang === 'ru'
    ? new Intl.NumberFormat('ru-RU', { style:'currency', currency:'RUB', maximumFractionDigits:0 }).format(totalRub)
    : new Intl.NumberFormat('en-IE', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(totalEur);

  return (
    <div style={{ position:'fixed', inset:0, zIndex:300 }}>
      <div onClick={onClose} style={{ position:'absolute', inset:0, background:'rgba(20,14,8,0.55)', opacity: visible ? 1 : 0, transition:'opacity 0.3s' }}/>
      <div className="perle-cart-side" style={{ position:'absolute', top:0, right:0, bottom:0, width:380, maxWidth:'90vw',
        background:'#f3ece0', transform: visible ? 'translateX(0)' : 'translateX(100%)',
        transition:'transform 0.36s cubic-bezier(0.32,0,0.15,1)', display:'flex', flexDirection:'column',
        boxShadow:'-16px 0 50px rgba(60,30,10,0.12)', willChange: 'transform' }}>
        <div style={{ padding:'24px 26px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid rgba(140,100,60,0.10)' }}>
          <span style={{ fontFamily:"'Fraunces',serif", fontSize:19 }}>{T('cart', lang)}</span>
          <button onClick={() => { window.__cursor?.idle(); onClose(); }} onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
            style={{ color:'rgba(100,72,44,0.50)', fontSize:20, background:'none', border:'none', padding:0, fontFamily:'inherit' }}>✕</button>
        </div>
        <div style={{ flex:1, overflowY:'auto', padding:'18px 26px' }}>
          {cart.length === 0 && (
            <div style={{ textAlign:'center', padding:'60px 20px', color:'rgba(100,72,44,0.50)', fontStyle:'italic' }}>
              {T('cart_empty', lang)}
            </div>
          )}
          {cart.map((item, i) => (
            <div key={i} style={{ display:'flex', gap:14, padding:'14px 0', borderBottom:'1px solid rgba(140,100,60,0.08)', alignItems:'center' }}>
              <div style={{ width:60, height:60, background:'#ede4d4', borderRadius:7, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
                <WalletDisplay product={item.product} color={item.color} mode="closed"/>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:"'Fraunces',serif", fontSize:14, color:'#1a1410' }}>{item.full?.[lang] || item.full?.en}</div>
                <div style={{ fontSize:11, color:'rgba(100,72,44,0.55)' }}>{item.color?.name?.[lang] || item.color?.name?.en}</div>
                <div style={{ fontSize:13, marginTop:3, color:'rgba(80,52,18,0.85)' }}>
                  {lang === 'ru'
                    ? new Intl.NumberFormat('ru-RU', { style:'currency', currency:'RUB', maximumFractionDigits:0 }).format(item.price.rub)
                    : new Intl.NumberFormat('en-IE', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(item.price.eur)}
                </div>
              </div>
              <button onClick={() => onRemove(i)} onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
                style={{ color:'rgba(100,72,44,0.32)', fontSize:18, background:'none', border:'none', padding:0, fontFamily:'inherit' }}>✕</button>
            </div>
          ))}
        </div>
        {cart.length > 0 && (
          <div style={{ padding:'18px 26px 26px', borderTop:'1px solid rgba(140,100,60,0.10)' }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:14 }}>
              <span style={{ fontSize:12, letterSpacing:'0.10em', textTransform:'uppercase', color:'rgba(100,72,44,0.55)' }}>{T('total', lang)}</span>
              <span style={{ fontFamily:"'Fraunces',serif", fontSize:20 }}>{totalDisplay}</span>
            </div>
            <button onClick={onCheckout}
              onMouseEnter={(e) => { e.currentTarget.style.background='rgba(140,100,60,0.16)'; window.__cursor?.hover(); }}
              onMouseLeave={(e) => { e.currentTarget.style.background='transparent'; window.__cursor?.idle(); }}
              style={{ width:'100%', padding:'13px 0', background:'transparent', border:'1px solid rgba(140,100,60,0.40)', borderRadius:8,
                color:'rgba(80,52,18,0.92)', fontSize:11.5, letterSpacing:'0.16em', textTransform:'uppercase',
                fontFamily:'inherit', transition:'background 0.2s' }}>
              {T('checkout', lang)}
            </button>
            <div style={{ marginTop:10, fontSize:11, textAlign:'center', color:'rgba(100,72,44,0.50)' }}>{T('free_shipping', lang)}</div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   CHECKOUT — simplified: contacts → channel → confirm. No SDEK step.
═════════════════════════════════════════════════════════════════ */
function Checkout({ cart, onClose, onComplete, lang }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    name:'', email:'', phone:'',
    notes:'',
    contact_method:'telegram', contact_value:'',
  });
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const up = (k,v) => setForm(f => ({ ...f, [k]: v }));
  const totalRub = cart.reduce((s,i) => s + (i.price.rub || 0), 0);
  const totalEur = cart.reduce((s,i) => s + (i.price.eur || 0), 0);
  const totalDisplay = lang === 'ru'
    ? new Intl.NumberFormat('ru-RU', { style:'currency', currency:'RUB', maximumFractionDigits:0 }).format(totalRub)
    : new Intl.NumberFormat('en-IE', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(totalEur);

  const inp = { width:'100%', padding:'12px 14px', background:'rgba(140,100,60,0.06)', border:'1px solid rgba(140,100,60,0.18)', borderRadius:7, color:'#1a1410', fontSize:14, outline:'none', transition:'border-color 0.2s' };
  const lbl = { fontSize:10.5, letterSpacing:'0.12em', textTransform:'uppercase', color:'rgba(100,72,44,0.50)', marginBottom:6, display:'block' };
  const steps = [T('contact', lang), T('confirm', lang)];

  const channels = [
    { id:'telegram', label:'Telegram',           ph:'@username' },
    { id:'whatsapp', label:'WhatsApp',           ph:'+7 …' },
    { id:'vk',       label:'VKontakte',          ph:'vk.com/username' },
    { id:'email',    label:T('email', lang),     ph:'name@example.com' },
    { id:'phone',    label:T('phone', lang),     ph:'+7 …' },
  ];

  const stepValid = (s) => {
    if (s === 0) return form.name.trim().length > 1 && /^\S+@\S+\.\S+$/.test(form.email) && form.phone.trim().length > 5;
    if (s === 1) return !!form.contact_method && form.contact_value.trim().length > 1;
    return false;
  };

  const submitOrder = async () => {
    setError('');
    setSubmitting(true);
    try {
      const payload = {
        customer: { name: form.name, email: form.email, phone: form.phone },
        contact:  { method: form.contact_method, value: form.contact_value },
        notes:    form.notes,
        items: cart.map(i => ({
          id: i.product.id,
          name: i.full?.[lang] || i.full?.en,
          color: i.color?.name?.[lang] || i.color?.name?.en,
          color_id: i.color?.id,
          price: lang === 'ru' ? i.price.rub : i.price.eur,
          currency: lang === 'ru' ? 'RUB' : 'EUR',
        })),
        total: lang === 'ru' ? totalRub : totalEur,
        currency: lang === 'ru' ? 'RUB' : 'EUR',
        language: lang,
        submitted_at: new Date().toISOString(),
      };
      let ok = false;
      try {
        const res = await fetch('/api/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (res.ok) ok = true;
        else {
          const errBody = await res.json().catch(() => ({}));
          setError(errBody.error || `Server error ${res.status}`);
        }
      } catch (_) {}
      if (!ok) {
        // Dev fallback: log to console so checkout flow can be tested locally
        console.warn('Pērle DEV /api/order not reachable. Payload:', payload);
        await new Promise(r => setTimeout(r, 600));
      }
      onComplete();
    } catch (err) {
      setError(err.message || 'Submission failed');
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div style={{ position:'fixed', inset:0, zIndex:400, background:'rgba(240,234,224,0.97)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div style={{ background:'#f3ece0', borderRadius:18, maxWidth:520, width:'100%', boxShadow:'0 30px 80px rgba(60,30,10,0.18)', overflow:'hidden' }}>
        <div style={{ padding:'28px 32px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ display:'flex', gap:0, alignItems:'center' }}>
            {steps.map((s, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center' }}>
                <div style={{ width:24, height:24, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
                  background: i < step ? 'rgba(140,100,60,0.16)' : i === step ? 'rgba(140,100,60,0.10)' : 'transparent',
                  border: `1px solid ${i <= step ? 'rgba(140,100,60,0.45)' : 'rgba(140,100,60,0.16)'}`,
                  fontSize:10.5, color: i <= step ? 'rgba(100,68,28,0.88)' : 'rgba(100,68,28,0.32)', transition:'all 0.3s' }}>{i < step ? '✓' : i+1}</div>
                <span style={{ marginLeft:8, fontSize:11.5, letterSpacing:'0.07em', color: i === step ? 'rgba(100,68,28,0.85)' : 'rgba(100,68,28,0.30)' }}>{s}</span>
                {i < steps.length-1 && <div style={{ width:26, height:1, background:'rgba(140,100,60,0.14)', margin:'0 12px' }}/>}
              </div>
            ))}
          </div>
          <button onClick={() => { window.__cursor?.idle(); onClose(); }} onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
            style={{ color:'rgba(100,72,44,0.45)', fontSize:20, background:'none', border:'none', padding:0, fontFamily:'inherit' }}>✕</button>
        </div>
        <div style={{ padding:'30px 32px 32px', display:'flex', flexDirection:'column', gap:16 }}>
          {step === 0 && <>
            <h3 style={{ fontFamily:"'Fraunces',serif", fontSize:24, color:'#1a1410', marginBottom:2 }}>{T('contact', lang)}</h3>
            {[[T('full_name', lang),'name','text'], [T('email', lang),'email','email'], [T('phone', lang),'phone','tel']].map(([ph,k,t]) => (
              <div key={k}>
                <label style={lbl}>{ph}</label>
                <input type={t} placeholder={ph} value={form[k]} onChange={(e) => up(k, e.target.value)}
                  style={inp}
                  onFocus={(e) => e.target.style.borderColor='rgba(140,100,60,0.45)'}
                  onBlur={(e)  => e.target.style.borderColor='rgba(140,100,60,0.18)'}/>
              </div>
            ))}
            <div>
              <label style={lbl}>{T('notes_label', lang)}</label>
              <textarea placeholder={T('notes_ph', lang)} value={form.notes} onChange={(e) => up('notes', e.target.value)} rows={2}
                style={{ ...inp, resize:'vertical', minHeight:64, fontFamily:'inherit' }}
                onFocus={(e) => e.target.style.borderColor='rgba(140,100,60,0.45)'}
                onBlur={(e)  => e.target.style.borderColor='rgba(140,100,60,0.18)'}/>
            </div>
          </>}
          {step === 1 && <>
            <h3 style={{ fontFamily:"'Fraunces',serif", fontSize:24, color:'#1a1410', marginBottom:2 }}>{T('how_to_contact', lang)}</h3>
            <p style={{ fontSize:12.5, color:'rgba(80,55,22,0.62)', lineHeight:1.7, marginTop:-4 }}>{T('how_to_contact_sub', lang)}</p>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {channels.map(ch => (
                <button key={ch.id} onClick={() => up('contact_method', ch.id)}
                  onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
                  style={{ padding:'8px 14px', borderRadius:6, fontSize:12, letterSpacing:'0.04em',
                    background: form.contact_method === ch.id ? 'rgba(140,100,60,0.14)' : 'transparent',
                    border: `1px solid ${form.contact_method === ch.id ? 'rgba(140,100,60,0.50)' : 'rgba(140,100,60,0.18)'}`,
                    color: form.contact_method === ch.id ? 'rgba(80,52,18,0.92)' : 'rgba(100,72,44,0.55)',
                    transition:'all 0.2s', fontFamily:'inherit' }}>{ch.label}</button>
              ))}
            </div>
            <div>
              <label style={lbl}>{channels.find(c => c.id === form.contact_method)?.label} — {T('your_handle', lang)}</label>
              <input placeholder={channels.find(c => c.id === form.contact_method)?.ph}
                value={form.contact_value} onChange={(e) => up('contact_value', e.target.value)} style={inp}
                onFocus={(e) => e.target.style.borderColor='rgba(140,100,60,0.45)'}
                onBlur={(e)  => e.target.style.borderColor='rgba(140,100,60,0.18)'}/>
            </div>
            <div style={{ padding:14, background:'rgba(140,100,60,0.06)', borderRadius:8, border:'1px solid rgba(140,100,60,0.10)' }}>
              <p style={{ fontSize:12.5, color:'rgba(80,55,22,0.70)', lineHeight:1.75 }}>{T('payment_explainer', lang)}</p>
            </div>
            <div style={{ borderTop:'1px solid rgba(140,100,60,0.10)', paddingTop:14 }}>
              {cart.map((item, i) => (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', fontSize:12.5, color:'rgba(100,72,44,0.62)', marginBottom:5 }}>
                  <span>{item.full?.[lang] || item.full?.en} · {item.color?.name?.[lang] || item.color?.name?.en}</span>
                  <span>{lang === 'ru'
                    ? new Intl.NumberFormat('ru-RU', { style:'currency', currency:'RUB', maximumFractionDigits:0 }).format(item.price.rub)
                    : new Intl.NumberFormat('en-IE', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(item.price.eur)}</span>
                </div>
              ))}
              <div style={{ display:'flex', justifyContent:'space-between', marginTop:10, fontFamily:"'Fraunces',serif", fontSize:18, color:'#1a1410' }}>
                <span>{T('total', lang)}</span><span>{totalDisplay}</span>
              </div>
            </div>
          </>}
          {error && <div style={{ padding:'10px 12px', background:'rgba(160,40,40,0.06)', border:'1px solid rgba(160,40,40,0.20)', borderRadius:6, color:'rgba(120,30,30,0.80)', fontSize:12.5 }}>{error}</div>}
          <div style={{ display:'flex', gap:9, marginTop:4 }}>
            {step > 0 && <button onClick={() => setStep(s => s-1)} disabled={submitting}
              onMouseEnter={(e) => { e.currentTarget.style.background='rgba(140,100,60,0.06)'; window.__cursor?.hover(); }}
              onMouseLeave={(e) => { e.currentTarget.style.background='transparent'; window.__cursor?.idle(); }}
              style={{ flex:1, padding:'12px 0', border:'1px solid rgba(140,100,60,0.18)', borderRadius:8, color:'rgba(100,72,44,0.62)',
                fontSize:12, letterSpacing:'0.10em', textTransform:'uppercase', background:'transparent', transition:'background 0.2s', fontFamily:'inherit' }}>{T('back', lang)}</button>}
            <button onClick={() => step < 1 ? setStep(s => s+1) : submitOrder()} disabled={!stepValid(step) || submitting}
              onMouseEnter={(e) => { if (stepValid(step) && !submitting) { e.currentTarget.style.background='rgba(140,100,60,0.14)'; window.__cursor?.hover(); } }}
              onMouseLeave={(e) => { e.currentTarget.style.background='transparent'; window.__cursor?.idle(); }}
              style={{ flex:2, padding:'12px 0', background:'transparent', border:'1px solid rgba(140,100,60,0.40)', borderRadius:8,
                color:'rgba(80,52,18,0.92)', fontSize:11.5, letterSpacing:'0.16em', textTransform:'uppercase',
                transition:'background 0.2s', fontFamily:'inherit', opacity: (!stepValid(step) || submitting) ? 0.45 : 1 }}>
              {submitting ? <><span className="perle-spinner"/>{T('submitting', lang)}</> : (step < 1 ? T('continue', lang) : T('send_request', lang))}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   NAV — desktop full row + mobile hamburger drawer
═════════════════════════════════════════════════════════════════ */
function Nav({ cartCount, cartBouncing, onCartOpen, page, setPage, lang, setLang }) {
  const [drawer, setDrawer] = useState(false);
  const [dragActive, setDragActive] = useState(false);   // is a wallet being dragged anywhere?
  const [hidden, setHidden] = useState(false);            // hide-on-scroll-down

  // Listen for drag events from any ProductCard
  useEffect(() => {
    const onDragStart = () => setDragActive(true);
    const onDragEnd   = () => setDragActive(false);
    document.addEventListener('perle-drag-start', onDragStart);
    document.addEventListener('perle-drag-end',   onDragEnd);
    return () => {
      document.removeEventListener('perle-drag-start', onDragStart);
      document.removeEventListener('perle-drag-end',   onDragEnd);
    };
  }, []);

  // Hide nav on scroll-down, show on scroll-up
  useEffect(() => {
    let lastY = window.scrollY;
    let ticking = false;
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const y = window.scrollY;
        if (y < 80)               setHidden(false);                       // always show near top
        else if (y > lastY + 6)   setHidden(true);                        // scrolling down
        else if (y < lastY - 4)   setHidden(false);                       // scrolling up
        lastY = y;
        ticking = false;
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const navLink = (key, label) => (
    <button onClick={() => { setPage(key); setDrawer(false); }}
      onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
      style={{ background:'none', border:'none', padding:'4px 0', fontFamily:'inherit',
        fontSize:12.5, letterSpacing:'0.10em', textTransform:'uppercase',
        color: page === key ? '#1a1410' : 'rgba(100,72,44,0.62)',
        borderBottom: page === key ? '1px solid rgba(80,52,18,0.45)' : '1px solid transparent',
        transition:'all 0.2s' }}>{label}</button>
  );
  const langBtn = (code, label) => (
    <button onClick={() => setLang(code)}
      onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
      style={{ background:'none', border:'none', padding:'2px 6px', fontFamily:'inherit', fontSize:11,
        color: lang === code ? '#1a1410' : 'rgba(100,72,44,0.45)',
        fontWeight: lang === code ? 500 : 300, letterSpacing:'0.04em' }}>{label}</button>
  );

  return (
    <>
      <nav className="perle-nav" style={{ position:'fixed', top:0, left:0, right:0, zIndex:100,
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'0 36px', height:64,
        background:'rgba(243,236,224,0.92)',
        backdropFilter:'blur(8px)',
        WebkitBackdropFilter:'blur(8px)',
        borderBottom:'1px solid rgba(140,100,60,0.10)',
        // Hide on scroll-down, but always force-show while a drag is active (so user can drop into cart)
        transform: (hidden && !dragActive) ? 'translateY(-100%)' : 'translateY(0)',
        transition: 'transform 0.32s cubic-bezier(0.4, 0, 0.2, 1)',
        // Force own compositing layer to prevent painting jitter when wallets are dragged below
        willChange: 'transform',
      }}>

        <button onClick={() => setPage('shop')} onMouseEnter={() => window.__cursor?.hover()} onMouseLeave={() => window.__cursor?.idle()}
          style={{ background:'none', border:'none', padding:0 }}>
          <PearlLogo size={36} withText/>
        </button>

        {/* Desktop nav */}
        <div className="nav-desktop" style={{ display:'flex', gap:30, alignItems:'center' }}>
          {navLink('shop',  T('collections', lang))}
          {navLink('about', T('about',       lang))}

        <div onClick={() => setDrawer(false)} style={{ position:'absolute', inset:0, background:'rgba(20,14,8,0.55)', opacity: drawer ? 1 : 0, transition:'opacity 0.3s' }}/>
        <div style={{ position:'absolute', top:0, right:0, bottom:0, width:280, maxWidth:'85vw',

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>

            <button onClick={() => setDrawer(false)} style={{ color:'rgba(100,72,44,0.50)', fontSize:22, background:'none', border:'none', padding:0 }}>✕</button>
          </div>
          {navLink('shop',  T('collections', lang))}
          {navLink('about', T('about',       lang))}
          {navLink('riga',  T('riga',        lang))}
          <div style={{ height:1, background:'rgba(140,100,60,0.14)', margin:'4px 0' }}/>
          <div style={{ display:'flex', gap:8 }}>

    </>
  );
}

/* ════════════════════════════════════════════════════════════════
   MOBILE DROP ZONE — bottom-of-screen drop target visible only while
   a wallet is being dragged. Solves the "cart icon is far up there
   and impractical with one hand" problem on phones.
═════════════════════════════════════════════════════════════════ */
function MobileDropZone({ onCartOpen }) {
  const [active, setActive] = useState(false);
  useEffect(() => {
    const onStart = () => setActive(true);
    const onEnd   = () => setActive(false);
    document.addEventListener('perle-drag-start', onStart);
    document.addEventListener('perle-drag-end',   onEnd);
    return () => {
      document.removeEventListener('perle-drag-start', onStart);
      document.removeEventListener('perle-drag-end',   onEnd);
    };
  }, []);
  return (
    <div className="nav-mobile-only" style={{
      display: 'none',                      // becomes 'flex' via .nav-mobile-only media query
      position: 'fixed',
      bottom: 24,
      left: '50%',
      transform: `translateX(-50%) translateY(${active ? 0 : 30}px)`,
      opacity: active ? 1 : 0,
      transition: 'opacity 0.25s, transform 0.25s',
      pointerEvents: active ? 'auto' : 'none',
      zIndex: 90,
    }}>
      <button
        data-cart-drop-target="true"
        onClick={onCartOpen}
        style={{
          width: 72, height: 72, borderRadius: '50%',
          background: 'rgba(243,236,224,0.96)',
          border: '1px dashed rgba(140,100,60,0.55)',
          color: 'rgba(80,52,18,0.85)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontFamily: 'inherit', boxShadow: '0 10px 30px rgba(60,30,10,0.18)',
          animation: active ? 'cart-pulse 1.1s ease-in-out infinite' : 'none',
        }}>
        <BagIcon size={26}/>
      </button>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   APP ROOT
═════════════════════════════════════════════════════════════════ */
function App() {
  const [lang,    setLang]    = useState('ru');
  const [page,    setPage]    = useState('shop');
  const [cart,    setCart]    = useState([]);
  const [cartOpen,setCartOpen]= useState(false);
  const [checkout,setCheckout]= useState(false);
  const [confirmShown, setConfirmShown] = useState(false);
  const [modal,   setModal]   = useState(null);    // currently-viewed product
  const [policyShown, setPolicyShown] = useState(null); // 'returns' | 'privacy' | null
  const [cartBouncing, setCartBouncing] = useState(false);

  const onAdd = (product, color) => {
    setCart(c => [...c, {
      product,
      full: product.full,
      price: product.price,
      color,
    }]);
    setCartBouncing(true);
    setTimeout(() => setCartBouncing(false), 460);
  };
  const onRemove = (i) => setCart(c => c.filter((_, idx) => idx !== i));

  return (
    <>
      <Cursor/>
      <Nav cartCount={cart.length} cartBouncing={cartBouncing} onCartOpen={() => setCartOpen(true)}
        page={page} setPage={setPage} lang={lang} setLang={setLang}/>
      <MobileDropZone onCartOpen={() => setCartOpen(true)}/>

      <main style={{ paddingTop: 0, minHeight:'100vh' }}>
        <div key={page} className="page-fade">
          {page === 'shop'  && <ShopPage  lang={lang} onOpen={setModal} onAdd={onAdd}/>}
          {page === 'about' && <AboutPage lang={lang}/>}
          {page === 'riga'  && <RigaPage  lang={lang}/>}
        </div>
      </main>

      <Footer lang={lang}
        onShowReturns={() => setPolicyShown('returns')}
        onShowPrivacy={() => setPolicyShown('privacy')}/>

      {modal && <ProductModal product={modal} lang={lang} onClose={() => setModal(null)} onAdd={onAdd}/>}

      <CartSidebar cart={cart} open={cartOpen} onClose={() => setCartOpen(false)}
        onCheckout={() => { setCartOpen(false); setCheckout(true); }} onRemove={onRemove} lang={lang}/>

      {checkout && (
        <Checkout cart={cart} lang={lang}
          onClose={() => setCheckout(false)}
          onComplete={() => { setCheckout(false); setCart([]); setConfirmShown(true); }}/>
      )}

      {confirmShown && <OrderConfirm onClose={() => setConfirmShown(false)} lang={lang}/>}

      {policyShown === 'returns' && (
        <PolicyModal title={T('returns_title', lang)} body={T('returns_body', lang)}
          onClose={() => setPolicyShown(null)} lang={lang}/>
      )}
      {policyShown === 'privacy' && (
        <PolicyModal title={T('privacy_title', lang)} body={T('privacy_body', lang)}
          onClose={() => setPolicyShown(null)} lang={lang}/>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
